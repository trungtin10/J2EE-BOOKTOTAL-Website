server:
  port: ${SERVER_PORT:8081}
  forward-headers-strategy: framework

# URL gốc khi gửi link trong email (đặt APP_BASE_URL trên production)
app:
  base-url: ${APP_BASE_URL:http://localhost:8081}
  jwt:
    # HS256: secret đủ dài. Đổi JWT_SECRET → token/cookie cũ không còn hợp lệ (xóa cookie jwt hoặc đăng nhập lại).
    secret: ${JWT_SECRET:bookstore_secret_key_jwt_123_secure_v2}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

spring:
  config:
    # Support running app from either repo root or springboot-backend/
    import: optional:file:.env,optional:file:../.env
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:booktotal_srpboot}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # update: create missing tables/columns (e.g. provinces) for local DBs; set DDL_AUTO=none in production
      ddl-auto: ${DDL_AUTO:update}
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8
    mode: HTML

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USER:tintran2k4@gmail.com}
    password: ${EMAIL_PASS:ilat jpqq ocdb tiux}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  security:
    oauth2:
      client:
        registration:
          google:
            # Tránh crash khi chưa set env (Spring Boot yêu cầu non-empty).
            # Khi chạy thật, hãy set GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET để override.
            client-id: ${GOOGLE_CLIENT_ID:disabled-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:disabled-google-client-secret}
            scope: profile, email
            # Callback mặc định Spring: {baseUrl}/login/oauth2/code/google
            # (vd: https://xxxx.ngrok-free.dev/login/oauth2/code/google)
            # Trên Google Cloud Console → OAuth 2.0 Client → thêm đúng 2 mục (HTTPS, trùng host ngrok):
            #   Authorized JavaScript origins: https://xxxx.ngrok-free.dev
            #   Authorized redirect URIs:       https://xxxx.ngrok-free.dev/login/oauth2/code/google
            # server.forward-headers-strategy=framework giúp {baseUrl} nhận đúng scheme/host qua ngrok/proxy.
            # Đổi subdomain ngrok → cập nhật lại 2 URI trên.

# Folder for image uploads
upload:
  # Use ONE shared uploads folder at repo root to avoid duplicates
  dir: ${UPLOAD_DIR:../uploads/}

# Tùy chọn: đặt CLOUDINARY_* trong môi trường để upload ảnh SP lên Cloudinary; nếu thiếu → lưu cục bộ (upload.dir)
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

# MoMo payment (set env vars on real deployment; defaults are disabled)
momo:
  partner-code: ${MOMO_PARTNER_CODE:disabled-momo-partner}
  access-key: ${MOMO_ACCESS_KEY:disabled-momo-access}
  secret-key: ${MOMO_SECRET_KEY:disabled-momo-secret}
  endpoint: ${MOMO_ENDPOINT:https://test-payment.momo.vn/v2/gateway/api/create}
  request-type: ${MOMO_REQUEST_TYPE:captureWallet}
  lang: ${MOMO_LANG:vi}

# VNPAY — theo https://sandbox.vnpayment.vn/apis/docs/thanh-toan-pay/pay.html
# Trên cổng sandbox khai báo (HTTPS, trùng APP_BASE_URL/ngrok):
#   Return URL: .../payment/vnpay/return
#   IPN URL:    .../payment/vnpay/ipn  (GET, JSON RspCode/Message)
vnpay:
  tmn-code: ${VNPAY_TMN_CODE:disabled-vnpay-tmn}
  hash-secret: ${VNPAY_HASH_SECRET:disabled-vnpay-secret}
  pay-url: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
