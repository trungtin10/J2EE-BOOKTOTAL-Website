<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/admin_layout}">

<head>
    <meta charset="UTF-8">
    <title>Thêm danh mục</title>
</head>

<body>
<th:block layout:fragment="pageTitle">Thêm danh mục</th:block>

<div layout:fragment="content" class="container-fluid py-3">
    <div class="admin-page-header">
        <div>
            <div class="admin-page-title"><i class="fas fa-plus-circle me-2"></i>Thêm danh mục</div>
            <div class="admin-page-subtitle">Tạo danh mục mới cho sản phẩm</div>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/categories}" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-1"></i> Quay lại
            </a>
        </div>
    </div>

                <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
                    <i class="fas fa-exclamation-circle me-1"></i> <span th:text="${errorMessage}"></span>
                </div>

                <div class="pb-5">
                    <div class="card p-4">
                        <form th:action="@{/admin/categories/add}" method="POST" th:object="${category}">
                            <div class="row mb-3">
                                <div class="col-md-12">
                                    <label class="form-label fw-bold">Tên danh mục <span
                                            class="text-danger">*</span></label>
                                    <input type="text" th:field="*{name}" class="form-control"
                                        placeholder="Nhập tên danh mục..." required>
                                </div>
                            </div>
                            <div class="text-end mt-4">
                                <button type="submit" class="btn btn-success fw-bold"><i class="fas fa-save"></i> Thêm
                                    Danh Mục</button>
                            </div>
                        </form>
                    </div>
                </div>
</div>
</body>

</html>
