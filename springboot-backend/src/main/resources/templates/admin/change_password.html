<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{admin/layout/admin_layout}">

<head>
    <title>Đổi mật khẩu | Admin</title>
</head>

<body>
    <div layout:fragment="pageTitle">ĐỔI MẬT KHẨU</div>

    <div layout:fragment="content">
        <th:block th:with="activePage='change-password'"></th:block>

        <div th:if="${errorMessage != null or param.error != null}" class="alert alert-danger d-flex align-items-center" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span th:text="${errorMessage ?: param.error}"></span>
        </div>
        <div th:if="${successMessage != null or param.success != null}" class="alert alert-success d-flex align-items-center" role="alert">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${successMessage ?: param.success}"></span>
        </div>

        <div class="row g-4">
            <div class="col-lg-8 col-xl-6 mx-auto">
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-header bg-white py-3">
                        <h5 class="mb-0 fw-bold">
                            <i class="fas fa-key me-1 text-primary"></i> Cập nhật mật khẩu
                        </h5>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/admin/change-password}" method="POST" autocomplete="off">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Mật khẩu hiện tại</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0"><i class="fas fa-lock text-muted opacity-50"></i></span>
                                    <input type="password" class="form-control border-start-0" name="current_password" required placeholder="••••••••">
                                </div>
                            </div>
                            
                            <hr class="my-4 opacity-50">
                            
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Mật khẩu mới</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0"><i class="fas fa-key text-muted opacity-50"></i></span>
                                    <input type="password" class="form-control border-start-0" name="new_password" required placeholder="Nhập mật khẩu mới">
                                </div>
                                <div class="form-text mt-2 small">Mật khẩu nên chứa ít nhất 8 ký tự bao gồm chữ cái và số.</div>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Nhập lại mật khẩu mới</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0"><i class="fas fa-check-double text-muted opacity-50"></i></span>
                                    <input type="password" class="form-control border-start-0" name="confirm_password" required placeholder="Nhập lại mật khẩu mới">
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-primary fw-bold w-100 py-2 shadow-sm">
                                <i class="fas fa-sync-alt me-1"></i> Cập nhật mật khẩu
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
