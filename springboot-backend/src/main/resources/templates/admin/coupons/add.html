<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Mã giảm giá | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .form-label { font-weight: 600; color: #555; }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div th:replace="~{admin/partials/layout :: sidebar}"></div>

            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
                    <h1 class="h2"><i class="fas fa-ticket-alt me-2 text-primary"></i> <span th:text="${title}">Thêm mã giảm giá</span></h1>
                    <div class="d-flex align-items-center">
                        <a th:href="@{/admin/coupons}" class="btn btn-outline-secondary btn-sm me-2"><i class="fas fa-arrow-left me-1"></i> Quay lại</a>
                        <div th:replace="~{admin/partials/layout :: topbar}"></div>
                    </div>
                </div>

                <div class="row justify-content-center">
                    <div class="col-lg-8">
                        <div class="card shadow-sm">
                            <div class="card-body p-4">
                                <form th:action="@{/admin/coupons/save}" th:object="${coupon}" method="POST" id="couponForm">
                                    <input type="hidden" th:field="*{id}">

                                    <div class="row mb-3">
                                        <div class="col-md-6">
                                            <label class="form-label">Mã giảm giá <span class="text-danger">*</span></label>
                                            <input type="text" th:field="*{code}" class="form-control" placeholder="Ví dụ: GIAM20K" required>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label">Loại mã</label>
                                            <select th:field="*{type}" class="form-select">
                                                <option value="PRODUCT">Giảm giá sản phẩm</option>
                                                <option value="SHIPPING">Giảm phí vận chuyển</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label">Nội dung giảm giá</label>
                                        <textarea th:field="*{description}" class="form-control" rows="2" placeholder="Mô tả ngắn gọn về chương trình giảm giá..."></textarea>
                                    </div>

                                    <div class="row mb-3">
                                        <div class="col-md-6">
                                            <label class="form-label">Kiểu giảm giá</label>
                                            <select th:field="*{discountType}" class="form-select" id="discountType">
                                                <option value="PERCENT">Giảm theo %</option>
                                                <option value="FIXED">Giảm số tiền cố định (VNĐ)</option>
                                            </select>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label">Giá trị giảm <span class="text-danger">*</span></label>
                                            <div class="input-group">
                                                <input type="text" id="discountValueDisplay" class="form-control" placeholder="Nhập giá trị..." required>
                                                <span class="input-group-text" id="unitLabel">%</span>
                                                <!-- Hidden input để gửi giá trị số thực tế về server -->
                                                <input type="hidden" th:field="*{discountValue}" id="discountValueHidden">
                                            </div>
                                        </div>
                                    </div>

                                    <div class="row mb-3">
                                        <div class="col-md-6">
                                            <label class="form-label">Đơn tối thiểu (VNĐ)</label>
                                            <input type="text" id="minOrderValueDisplay" class="form-control" placeholder="0">
                                            <input type="hidden" th:field="*{minOrderValue}" id="minOrderValueHidden">
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label">Ngày hết hạn <span class="text-danger">*</span></label>
                                            <input type="date" name="expirationDate" class="form-control"
                                                   th:value="${coupon.expirationDate != null ? #temporals.format(coupon.expirationDate, 'yyyy-MM-dd') : ''}"
                                                   required>
                                        </div>
                                    </div>

                                    <div class="row mb-3">
                                        <div class="col-md-6">
                                            <label class="form-label">Tổng lượt dùng tối đa</label>
                                            <input type="number" th:field="*{usageLimit}" class="form-control" placeholder="Để trống nếu không giới hạn">
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label">Giới hạn mỗi khách hàng</label>
                                            <input type="number" th:field="*{userUsageLimit}" class="form-control" min="1" required>
                                        </div>
                                    </div>

                                    <div class="mb-3">
                                        <div class="form-check form-switch">
                                            <input class="form-check-input" type="checkbox" th:field="*{isActive}" id="isActiveSwitch">
                                            <label class="form-check-label fw-bold" for="isActiveSwitch">Kích hoạt mã này</label>
                                        </div>
                                    </div>

                                    <div class="text-end mt-4">
                                        <button type="submit" class="btn btn-primary px-5">
                                            <i class="fas fa-save me-1"></i> Lưu mã giảm giá
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const discountType = document.getElementById('discountType');
        const unitLabel = document.getElementById('unitLabel');
        const displayInputs = [
            { display: 'discountValueDisplay', hidden: 'discountValueHidden' },
            { display: 'minOrderValueDisplay', hidden: 'minOrderValueHidden' }
        ];

        // Cập nhật đơn vị hiển thị
        discountType.addEventListener('change', function() {
            unitLabel.textContent = this.value === 'PERCENT' ? '%' : 'VNĐ';
            formatInput(document.getElementById('discountValueDisplay'), document.getElementById('discountValueHidden'));
        });

        // Hàm định dạng tiền tệ VNĐ
        function formatCurrency(value) {
            if (!value) return '';
            return value.toString().replace(/\D/g, "").replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        function formatInput(displayEl, hiddenEl) {
            let rawValue = displayEl.value.replace(/\./g, "");
            if (discountType.value === 'PERCENT' && displayEl.id === 'discountValueDisplay') {
                // Nếu là %, không cần định dạng dấu chấm
                hiddenEl.value = rawValue;
            } else {
                // Nếu là VNĐ, định dạng dấu chấm
                displayEl.value = formatCurrency(rawValue);
                hiddenEl.value = rawValue;
            }
        }

        displayInputs.forEach(pair => {
            const displayEl = document.getElementById(pair.display);
            const hiddenEl = document.getElementById(pair.hidden);

            // Hiển thị giá trị ban đầu khi Edit
            if (hiddenEl.value) {
                if (discountType.value === 'FIXED' || displayEl.id === 'minOrderValueDisplay') {
                    displayEl.value = formatCurrency(hiddenEl.value.split('.')[0]);
                } else {
                    displayEl.value = hiddenEl.value;
                }
            }

            displayEl.addEventListener('input', function() {
                formatInput(displayEl, hiddenEl);
            });
        });

        // Khởi tạo nhãn đơn vị ban đầu
        unitLabel.textContent = discountType.value === 'PERCENT' ? '%' : 'VNĐ';
    </script>
</body>
</html>
