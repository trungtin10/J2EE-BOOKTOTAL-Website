<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/admin_layout}">

<head>
    <meta charset="UTF-8">
    <title>Quản lý mã giảm giá</title>
    <th:block layout:fragment="css">
        <style>
            .coupon-code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-weight: 700; letter-spacing: 1px; }
        </style>
    </th:block>
</head>

<body>
<th:block layout:fragment="pageTitle">Quản lý mã giảm giá</th:block>

<div layout:fragment="content" class="container-fluid py-3">
    <div class="admin-page-header">
        <div>
            <div class="admin-page-title"><i class="fas fa-ticket-alt me-2"></i>Quản lý mã giảm giá</div>
            <div class="admin-page-subtitle">Danh sách coupon đang áp dụng trên hệ thống</div>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/coupons/add}" class="btn btn-primary">
                <i class="fas fa-plus me-1"></i> Thêm mã mới
            </a>
        </div>
    </div>

                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="fas fa-check-circle me-1"></i> <span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-3">ID</th>
                                        <th>Mã</th>
                                        <th>Loại</th>
                                        <th>Giảm</th>
                                        <th>Đơn tối thiểu</th>
                                        <th>Đã dùng</th>
                                        <th>Tổng lượt mã</th>
                                        <th>Lượt / KH</th>
                                        <th>Hết hạn</th>
                                        <th>Hiệu lực</th>
                                        <th class="pe-3 text-center">Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="c : ${coupons}">
                                        <td class="ps-3 text-muted" th:text="${'#' + c.id}"></td>
                                        <td><span class="coupon-code text-primary" th:text="${c.code}"></span></td>
                                        <td>
                                            <span class="badge bg-info text-dark" th:if="${c.type != null and c.type.equalsIgnoreCase('SHIPPING')}">Vận chuyển</span>
                                            <span class="badge bg-secondary" th:unless="${c.type != null and c.type.equalsIgnoreCase('SHIPPING')}">Sản phẩm</span>
                                        </td>
                                        <td class="fw-bold">
                                            <span th:text="${c.discountType == 'PERCENT' ? c.discountValue + '%' : #numbers.formatDecimal(c.discountValue, 0, 'COMMA', 0, 'POINT') + ' đ'}"></span>
                                        </td>
                                        <td th:text="${c.minOrderValue != null ? (#numbers.formatDecimal(c.minOrderValue, 0, 'COMMA', 0, 'POINT') + ' đ') : '0 đ'}"></td>
                                        <td th:text="${c.usedCount != null ? c.usedCount : 0}"></td>
                                        <td th:text="${c.usageLimit != null ? c.usageLimit : 'Không giới hạn'}"></td>
                                        <td class="text-center fw-bold text-secondary" th:text="${c.userUsageLimit != null ? c.userUsageLimit : 1}"></td>
                                        <td>
                                            <span th:if="${c.expirationDate != null}"
                                                  th:text="${#temporals.format(c.expirationDate, 'dd/MM/yyyy')}"
                                                  th:classappend="${c.expirationDate.isBefore(T(java.time.LocalDate).now()) ? 'text-danger fw-bold' : ''}"></span>
                                            <span th:unless="${c.expirationDate != null}">Không giới hạn</span>
                                        </td>
                                        <td>
                                            <span th:if="${c.isActive}" class="badge bg-success">Bật</span>
                                            <span th:unless="${c.isActive}" class="badge bg-danger">Tắt</span>
                                        </td>
                                        <td class="pe-3 text-center">
                                            <div class="btn-group">
                                                <a th:href="@{/admin/coupons/edit/{id}(id=${c.id})}" class="btn btn-sm btn-outline-primary"><i class="fas fa-edit"></i></a>
                                                <form th:action="@{/admin/coupons/delete/{id}(id=${c.id})}" method="POST"
                                                      onsubmit="return confirm('Bạn có chắc chắn muốn xóa mã này?')" style="display:inline;">
                                                    <button type="submit" class="btn btn-sm btn-outline-danger ms-1"><i class="fas fa-trash"></i></button>
                                                </form>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
</div>
</body>
</html>
