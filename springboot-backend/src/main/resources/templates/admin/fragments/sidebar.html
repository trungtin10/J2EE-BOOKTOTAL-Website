<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
    <div th:fragment="adminSidebar(activePage)" class="col-md-3 col-lg-2 d-md-block sidebar collapse p-0">
        <style>
            .sidebar {
                min-height: 100vh;
                background: linear-gradient(180deg, var(--brand, #0b1f33), #153f63 65%, #0f2f4a);
                padding-top: 20px;
                position: fixed;
                left: 0;
                top: 0;
                z-index: 1000;
                box-shadow: 10px 0 28px rgba(0,0,0,0.10);
            }
            .sidebar .nav-link {
                color: rgba(255,255,255,.86);
                padding: 12px 20px;
                transition: 0.18s ease;
                border-left: 4px solid transparent;
                border-radius: 10px;
                margin: 2px 10px;
            }
            .sidebar .nav-link:hover {
                color: #fff;
                background-color: rgba(31, 75, 122, 0.25);
                border-left-color: rgba(31, 75, 122, 0.95);
            }
            .sidebar .nav-link.active {
                color: #fff;
                background-color: rgba(201, 33, 39, 0.18);
                border-left: 4px solid var(--brand-accent, #1f4b7a);
                font-weight: 700;
                box-shadow: inset 10px 0 0 rgba(31,75,122,0.15);
            }
            main { margin-left: 16.666667%; } /* Đẩy nội dung chính sang phải để không bị Sidebar đè lên */
        </style>
        <div class="text-center mb-4 px-3">
            <h4 class="text-white fw-bold">BOOKTOTAL ADMIN</h4>
            <hr class="text-secondary">
        </div>
        <ul class="nav flex-column">
            <li class="nav-item">
                <a th:href="@{/admin}" class="nav-link" th:classappend="${activePage == 'dashboard' ? 'active' : ''}">
                    <i class="fas fa-tachometer-alt me-2"></i> Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/admin/products}" class="nav-link" th:classappend="${activePage == 'products' ? 'active' : ''}">
                    <i class="fas fa-book me-2"></i> Sản phẩm
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/admin/categories}" class="nav-link" th:classappend="${activePage == 'categories' ? 'active' : ''}">
                    <i class="fas fa-list me-2"></i> Danh mục
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/admin/orders}" class="nav-link" th:classappend="${activePage == 'orders' ? 'active' : ''}">
                    <i class="fas fa-shopping-cart me-2"></i> Đơn hàng
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/admin/user}" class="nav-link" th:classappend="${activePage == 'users' ? 'active' : ''}">
                    <i class="fas fa-users me-2"></i> Người dùng
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/admin/stats}" class="nav-link" th:classappend="${activePage == 'stats' ? 'active' : ''}">
                    <i class="fas fa-chart-bar me-2"></i> Thống kê
                </a>
            </li>
            <li class="nav-item mt-4">
                <a th:href="@{/}" class="nav-link text-warning">
                    <i class="fas fa-arrow-left me-2"></i> Quay lại Shop
                </a>
            </li>
        </ul>
    </div>
</body>
</html>
