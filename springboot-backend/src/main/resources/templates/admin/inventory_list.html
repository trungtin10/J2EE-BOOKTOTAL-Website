<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Quản lý kho | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .table th { background-color: #f8f9fa; font-weight: 600; }
        .stock-ok  { color: #28a745; font-weight: 600; }
        .stock-low { color: #ffc107; font-weight: 600; }
        .stock-out { color: #dc3545; font-weight: 600; }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div th:replace="~{admin/partials/layout :: sidebar}"></div>

            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2"><i class="fas fa-warehouse me-2"></i> QUẢN LÝ KHO</h1>
                    <div class="d-flex align-items-center">
                        <div th:replace="~{admin/partials/layout :: topbar}"></div>
                    </div>
                </div>

                <!-- Alerts -->
                <div th:if="${successMessage != null or param.success != null}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="fas fa-check-circle me-1"></i>
                    <span th:text="${successMessage ?: (param.success == 'import' ? 'Nhập hàng thành công!' : 'Xuất hàng thành công!')}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${errorMessage != null or param.error != null}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-circle me-1"></i>
                    <span th:text="${errorMessage ?: param.error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Stats row -->
                <div class="row mb-4">
                    <div class="col-md-4">
                        <div class="card text-center p-3">
                            <h6 class="text-muted mb-1">Tổng tồn kho</h6>
                            <h3 class="text-primary fw-bold" th:text="${totalProducts}">0</h3>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card text-center p-3">
                            <h6 class="text-muted mb-1">Sắp hết hàng (&lt;10)</h6>
                            <h3 class="text-warning fw-bold" th:text="${lowStockProducts}">0</h3>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                        <h5 class="mb-0 fw-bold"><i class="fas fa-boxes me-1"></i> Tồn kho sản phẩm</h5>

                        <!-- Filter Form -->
                        <form th:action="@{/admin/inventory}" method="GET" class="d-flex gap-2">
                            <input type="text" name="keyword" class="form-control form-control-sm"
                                   placeholder="Tìm sản phẩm..." th:value="${keyword}" style="width:200px;">
                            <select name="categoryId" class="form-select form-select-sm" style="width:160px;">
                                <option value="">Tất cả danh mục</option>
                                <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"
                                        th:selected="${categoryId != null and categoryId == c.id}"></option>
                            </select>
                            <select name="stockStatus" class="form-select form-select-sm" style="width:150px;">
                                <option value="all"   th:selected="${stockStatus == 'all'}">Tất cả</option>
                                <option value="ok"    th:selected="${stockStatus == 'ok'}">Đủ hàng (≥10)</option>
                                <option value="low"   th:selected="${stockStatus == 'low'}">Sắp hết (1-9)</option>
                                <option value="out"   th:selected="${stockStatus == 'out'}">Hết hàng</option>
                            </select>
                            <button type="submit" class="btn btn-primary btn-sm">
                                <i class="fas fa-filter me-1"></i> Lọc
                            </button>
                            <a th:href="@{/admin/inventory}" class="btn btn-outline-secondary btn-sm" title="Xóa bộ lọc">
                                <i class="fas fa-undo"></i>
                            </a>
                        </form>
                    </div>

                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead>
                                    <tr>
                                        <th class="ps-3" style="width: 60px;">Mã</th>
                                        <th style="width: 60px;">Ảnh</th>
                                        <th>Tên sản phẩm</th>
                                        <th>Danh mục</th>
                                        <th class="pe-3">Hành động</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:if="${products == null or products.empty}">
                                        <td colspan="5" class="text-center py-4 text-muted">Không có sản phẩm nào.</td>
                                    </tr>
                                    <tr th:each="product : ${products}">
                                        <td class="ps-3 text-muted small" th:text="'#' + ${product.id}"></td>
                                        <td>
                                            <img th:src="@{${product.imageUrl != null ? (product.imageUrl.startsWith('http') or product.imageUrl.startsWith('/uploads/') ? product.imageUrl : '/uploads/' + product.imageUrl) : '/uploads/default.jpg'}}"
                                                 style="width:40px;height:55px;object-fit:cover;border-radius:4px;"
                                                 onerror="this.src='/uploads/default.jpg'">
                                        </td>
                                        <td th:text="${product.name}" style="max-width:200px;" class="text-truncate"></td>
                                        <td th:text="${product.category != null ? product.category.name : '---'}" class="text-muted small"></td>
                                        <td>
                                            <span th:if="${product.quantity == 0}" class="badge bg-danger">Hết hàng</span>
                                            <span th:if="${product.quantity > 0 and product.quantity < 10}" class="badge bg-warning text-dark" th:text="${product.quantity} + ' (Sắp hết)'"></span>
                                            <span th:if="${product.quantity >= 10}" class="badge bg-success" th:text="${product.quantity}"></span>
                                        </td>
                                        <td class="pe-3">
                                            <button class="btn btn-success btn-sm btn-import me-1"
                                                    th:data-id="${product.id}" th:data-name="${product.name}">
                                                <i class="fas fa-arrow-down me-1"></i> Nhập
                                            </button>
                                            <button class="btn btn-warning btn-sm btn-export me-1"
                                                    th:data-id="${product.id}" th:data-name="${product.name}">
                                                <i class="fas fa-arrow-up me-1"></i> Xuất
                                            </button>
                                            <button class="btn btn-info btn-sm text-white btn-logs"
                                                    th:data-id="${product.id}" th:data-name="${product.name}">
                                                <i class="fas fa-history"></i>
                                            </button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <!-- Pagination -->
                        <nav th:if="${totalPages > 1}" class="d-flex justify-content-center py-3">
                            <ul class="pagination pagination-sm mb-0">
                                <li class="page-item" th:classappend="${currentPage == 0 ? 'disabled' : ''}">
                                    <a class="page-link" th:href="@{/admin/inventory(page=${currentPage - 1}, keyword=${keyword}, categoryId=${categoryId}, stockStatus=${stockStatus})}">&laquo;</a>
                                </li>
                                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                                    th:classappend="${i == currentPage ? 'active' : ''}">
                                    <a class="page-link" th:href="@{/admin/inventory(page=${i}, keyword=${keyword}, categoryId=${categoryId}, stockStatus=${stockStatus})}" th:text="${i + 1}"></a>
                                </li>
                                <li class="page-item" th:classappend="${currentPage == totalPages - 1 ? 'disabled' : ''}">
                                    <a class="page-link" th:href="@{/admin/inventory(page=${currentPage + 1}, keyword=${keyword}, categoryId=${categoryId}, stockStatus=${stockStatus})}">&raquo;</a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Import Modal -->
    <div class="modal fade" id="importModal" tabindex="-1">
        <div class="modal-dialog">
            <form th:action="@{/admin/inventory/import}" method="post" class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-arrow-down text-success me-2"></i>Nhập hàng: <span id="importProductName" class="text-success fw-bold"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" name="productId" id="importProductId">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Số lượng nhập <span class="text-danger">*</span></label>
                        <input type="number" name="quantity" class="form-control" min="1" required placeholder="Nhập số lượng...">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Ghi chú</label>
                        <textarea name="note" class="form-control" rows="2" placeholder="Lý do nhập hàng, nhà cung cấp..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    <button type="submit" class="btn btn-success"><i class="fas fa-check me-1"></i> Xác nhận nhập</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Export Modal -->
    <div class="modal fade" id="exportModal" tabindex="-1">
        <div class="modal-dialog">
            <form th:action="@{/admin/inventory/export}" method="post" class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-arrow-up text-warning me-2"></i>Xuất hàng: <span id="exportProductName" class="text-warning fw-bold"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" name="productId" id="exportProductId">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Số lượng xuất <span class="text-danger">*</span></label>
                        <input type="number" name="quantity" class="form-control" min="1" required placeholder="Nhập số lượng...">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Ghi chú</label>
                        <textarea name="note" class="form-control" rows="2" placeholder="Lý do xuất hàng..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    <button type="submit" class="btn btn-warning"><i class="fas fa-check me-1"></i> Xác nhận xuất</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Logs Modal -->
    <div class="modal fade" id="logsModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-history me-2"></i>Lịch sử kho: <span id="logsProductName" class="fw-bold text-info"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="table-responsive">
                        <table class="table table-sm table-striped">
                            <thead>
                                <tr>
                                    <th>Thời gian</th>
                                    <th>Loại</th>
                                    <th>Số lượng</th>
                                    <th>Ghi chú</th>
                                </tr>
                            </thead>
                            <tbody id="logsTableBody">
                                <tr><td colspan="4" class="text-center text-muted">Đang tải...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        document.querySelectorAll('.btn-import').forEach(btn => {
            btn.addEventListener('click', () => {
                document.getElementById('importProductId').value = btn.dataset.id;
                document.getElementById('importProductName').textContent = btn.dataset.name;
                new bootstrap.Modal(document.getElementById('importModal')).show();
            });
        });

        document.querySelectorAll('.btn-export').forEach(btn => {
            btn.addEventListener('click', () => {
                document.getElementById('exportProductId').value = btn.dataset.id;
                document.getElementById('exportProductName').textContent = btn.dataset.name;
                new bootstrap.Modal(document.getElementById('exportModal')).show();
            });
        });

        document.querySelectorAll('.btn-logs').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = btn.dataset.id;
                const name = btn.dataset.name;
                document.getElementById('logsProductName').textContent = name;
                document.getElementById('logsTableBody').innerHTML = '<tr><td colspan="4" class="text-center">Đang tải...</td></tr>';
                new bootstrap.Modal(document.getElementById('logsModal')).show();

                fetch('/admin/inventory/logs/' + id)
                    .then(r => r.json())
                    .then(logs => {
                        if (!logs || logs.length === 0) {
                            document.getElementById('logsTableBody').innerHTML = '<tr><td colspan="4" class="text-center text-muted">Chưa có lịch sử</td></tr>';
                            return;
                        }
                        let html = '';
                        logs.forEach(log => {
                            const date = log.createdAt ? new Date(log.createdAt).toLocaleString('vi-VN') : '---';
                            const typeBadge = log.type === 'IMPORT' ? 'success' : 'danger';
                            const typeLabel = log.type === 'IMPORT' ? 'Nhập' : 'Xuất';
                            html += `<tr>
                                <td>${date}</td>
                                <td><span class="badge bg-${typeBadge}">${typeLabel}</span></td>
                                <td class="fw-bold">${Math.abs(log.quantity)}</td>
                                <td>${log.note || '---'}</td>
                            </tr>`;
                        });
                        document.getElementById('logsTableBody').innerHTML = html;
                    })
                    .catch(() => {
                        document.getElementById('logsTableBody').innerHTML = '<tr><td colspan="4" class="text-danger text-center">Lỗi khi tải dữ liệu</td></tr>';
                    });
            });
        });
    </script>
</body>

</html>
