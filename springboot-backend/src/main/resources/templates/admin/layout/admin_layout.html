<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="UTF-8">
    <title layout:title-pattern="$CONTENT_TITLE | BOOKTOTAL ADMIN">Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <link rel="stylesheet" th:href="@{/css/admin-template.css}">
    <th:block layout:fragment="css"></th:block>
</head>

<body class="admin-shell">
        <div class="admin-topbar">
            <div class="admin-topbar-title" layout:fragment="pageTitle">Hệ thống quản trị</div>
            <div class="admin-topbar-right">
                <span class="admin-chip" sec:authentication="name">Admin</span>
                <div class="dropdown">
                    <button class="btn btn-sm btn-light" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="fas fa-user-shield me-1"></i> Tài khoản
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2">
                        <li><a class="dropdown-item py-2" th:href="@{/admin/profile}"><i class="fas fa-user-circle me-2"></i> Hồ sơ cá nhân</a></li>
                        <li><a class="dropdown-item py-2" th:href="@{/admin/change-password}"><i class="fas fa-key me-2"></i> Đổi mật khẩu</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="POST" class="m-0">
                                <button type="submit" class="dropdown-item py-2 text-danger"><i class="fas fa-sign-out-alt me-2"></i> Đăng xuất</button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="admin-layout">
            <aside class="admin-sidebar2">
                <a th:href="@{/admin}" class="admin-brand2">
                    <div>
                        <div>BOOKTOTAL ADMIN</div>
                        <span class="sub">SYSTEM MANAGER</span>
                    </div>
                </a>
                <div class="admin-menu-title">Menu</div>
                <ul class="admin-nav2">
                    <li><a th:href="@{/admin}" th:classappend="${activePage == 'dashboard' ? ' active' : ''}"><span class="ico"><i class="fas fa-tachometer-alt"></i></span> Tổng quan hệ thống</a></li>
                    <li><a th:href="@{/admin/orders}" th:classappend="${activePage == 'orders' ? ' active' : ''}"><span class="ico"><i class="fas fa-shopping-cart"></i></span> Đơn hàng</a></li>
                    <li><a th:href="@{/admin/products}" th:classappend="${activePage == 'products' ? ' active' : ''}"><span class="ico"><i class="fas fa-book"></i></span> Sản phẩm</a></li>
                    <li><a th:href="@{/admin/categories}" th:classappend="${activePage == 'categories' ? ' active' : ''}"><span class="ico"><i class="fas fa-list"></i></span> Danh mục</a></li>
                    <li><a th:href="@{/admin/inventory}" th:classappend="${activePage == 'inventory' ? ' active' : ''}"><span class="ico"><i class="fas fa-warehouse"></i></span> Kho hàng</a></li>
                    <li><a th:href="@{/admin/user}" th:classappend="${activePage == 'users' ? ' active' : ''}"><span class="ico"><i class="fas fa-users"></i></span> Người dùng</a></li>
                    <li><a th:href="@{/admin/coupons}" th:classappend="${activePage == 'coupons' ? ' active' : ''}"><span class="ico"><i class="fas fa-ticket-alt"></i></span> Mã giảm giá</a></li>
                    <li><a th:href="@{/admin/reviews}" th:classappend="${activePage == 'reviews' ? ' active' : ''}"><span class="ico"><i class="fas fa-star"></i></span> Đánh giá</a></li>
                    <li><a th:href="@{/admin/stats}" th:classappend="${activePage == 'stats' ? ' active' : ''}"><span class="ico"><i class="fas fa-chart-line"></i></span> Thống kê</a></li>
                </ul>
            </aside>

            <main class="admin-content">
                <div layout:fragment="content"></div>
            </main>
        </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <th:block layout:fragment="script"></th:block>
</body>
</html>
