<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title layout:title-pattern="$CONTENT_TITLE | BOOKTOTAL ADMIN">Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <link rel="stylesheet" th:href="@{/css/admin-template.css}">
    <link rel="stylesheet" th:href="@{/css/responsive.css}">
    <th:block layout:fragment="css"></th:block>
</head>

<body class="admin-shell">
    <div class="admin-topbar">
        <div class="d-flex align-items-center gap-2 flex-grow-1 min-w-0">
            <button type="button" class="btn btn-light btn-sm d-lg-none admin-menu-toggle flex-shrink-0"
                data-bs-toggle="offcanvas" data-bs-target="#adminSidebarOffcanvas" aria-controls="adminSidebarOffcanvas"
                aria-label="Mở menu">
                <i class="fas fa-bars"></i>
            </button>
            <div class="admin-topbar-title text-truncate" layout:fragment="pageTitle">Hệ thống quản trị</div>
        </div>
        <div class="admin-topbar-right flex-shrink-0">
            <span class="admin-chip d-none d-sm-inline" sec:authentication="name">Admin</span>
            <div class="dropdown">
                <button class="btn btn-sm btn-light" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="fas fa-user-shield me-1 d-none d-sm-inline"></i><span class="d-sm-none">TK</span><span class="d-none d-sm-inline"> Tài khoản</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2">
                    <li><a class="dropdown-item py-2" th:href="@{/admin/profile}"><i class="fas fa-user-circle me-2"></i> Hồ sơ cá nhân</a></li>
                    <li><a class="dropdown-item py-2" th:href="@{/admin/change-password}"><i class="fas fa-key me-2"></i> Đổi mật khẩu</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <form th:action="@{/logout}" method="POST" class="m-0">
                            <button type="submit" class="dropdown-item py-2 text-danger"><i class="fas fa-sign-out-alt me-2"></i> Đăng xuất</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <div class="offcanvas offcanvas-start admin-offcanvas-sidebar d-lg-none" tabindex="-1" id="adminSidebarOffcanvas"
        aria-labelledby="adminSidebarOffcanvasLabel">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title" id="adminSidebarOffcanvasLabel">Điều hướng</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Đóng"></button>
        </div>
        <div class="offcanvas-body p-2">
            <th:block th:replace="~{admin/fragments/admin_sidebar_inner :: adminSidebarInner}"></th:block>
        </div>
    </div>

    <div class="admin-layout">
        <aside class="admin-sidebar2 d-none d-lg-block">
            <th:block th:replace="~{admin/fragments/admin_sidebar_inner :: adminSidebarInner}"></th:block>
        </aside>

        <main class="admin-content">
            <div layout:fragment="content"></div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var canvas = document.getElementById('adminSidebarOffcanvas');
            if (!canvas || typeof bootstrap === 'undefined') return;
            canvas.querySelectorAll('a[href]').forEach(function (a) {
                if (a.getAttribute('href') === '#' || a.getAttribute('data-bs-dismiss')) return;
                a.addEventListener('click', function () {
                    var oc = bootstrap.Offcanvas.getInstance(canvas);
                    if (oc) oc.hide();
                });
            });
        });
    </script>
    <th:block layout:fragment="script"></th:block>
</body>
</html>
