<html xmlns:th="http://www.thymeleaf.org">

<body>
    <div th:fragment="menu">
        <style>
            .admin-sidebar {
                min-height: 100vh;
                background-color: #1a1a2e;
                color: #fff;
                padding-top: 20px;
            }

            .admin-brand {
                font-size: 1.5rem;
                font-weight: 800;
                color: #c49b63;
                text-align: center;
                margin-bottom: 30px;
                display: block;
                text-decoration: none;
            }

            .admin-nav .nav-link {
                color: #a8a8b3;
                padding: 12px 20px;
                font-weight: 500;
                border-left: 3px solid transparent;
                transition: 0.2s;
            }

            .admin-nav .nav-link:hover,
            .admin-nav .nav-link.active {
                color: #fff;
                background-color: rgba(255, 255, 255, 0.05);
                border-left-color: #c49b63;
            }

            .admin-nav i {
                width: 25px;
                text-align: center;
                margin-right: 10px;
            }

            .admin-user {
                display: none;
            }
        </style>

        <div class="col-md-3 col-lg-2 d-md-block admin-sidebar collapse">
            <a th:href="@{/admin}" class="admin-brand">BOOKTOTAL ADMIN</a>

            <ul class="nav flex-column admin-nav">
                <li class="nav-item">
                    <!-- Example active state class logic (requires mapping controller variables appropriately) -->
                    <a class="nav-link" th:href="@{/admin}"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/products}"><i class="fas fa-book"></i> Sản phẩm</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/categories}"><i class="fas fa-list"></i> Danh mục</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/orders}"><i class="fas fa-shopping-cart"></i> Đơn hàng</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/inventory}"><i class="fas fa-warehouse"></i> Kho hàng</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/user}"><i class="fas fa-users"></i> Người dùng</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/reviews}"><i class="fas fa-star"></i> Đánh giá</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/stats}"><i class="fas fa-chart-pie"></i> Thống kê</a>
                </li>
            </ul>

            <!-- User block moved to header -->
        </div>
    </div>
</body>

</html>
