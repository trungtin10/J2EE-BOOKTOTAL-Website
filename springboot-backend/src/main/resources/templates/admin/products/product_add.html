<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/admin_layout}">

<head>
    <meta charset="UTF-8">
    <title>Thêm sản phẩm</title>
    <th:block layout:fragment="css">
        <style>
        .upload-box {
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background: #fff;
        }

        .upload-box:hover {
            border-color: var(--brand, #0b1f33);
            background: #f6f9fc;
        }

        #previewImg {
            max-height: 200px;
            border-radius: 8px;
            display: none;
            margin: 0 auto;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .gallery-thumb {
            width: 72px;
            height: 72px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid rgba(0,0,0,0.06);
        }
        .gallery-thumb-wrap { position: relative; }
        .gallery-thumb-remove {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 24px;
            height: 24px;
            border-radius: 8px;
            border: 0;
            background: #dc3545;
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 16px rgba(0,0,0,0.15);
            cursor: pointer;
        }
        </style>
    </th:block>
</head>

<body>
<th:block layout:fragment="pageTitle">Thêm sản phẩm</th:block>

<div layout:fragment="content" class="container-fluid py-3" th:with="activePage='products'">
    <div class="admin-page-header">
        <div>
            <div class="admin-page-title"><i class="fas fa-plus-circle me-2"></i>Thêm sản phẩm</div>
            <div class="admin-page-subtitle">Tạo sản phẩm mới cho cửa hàng</div>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/products}" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-2"></i> Quay lại
            </a>
        </div>
    </div>

                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-circle me-1"></i> <span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <form th:action="@{/admin/products/add}" method="POST" enctype="multipart/form-data"
                    th:object="${product}">
                    <div class="row">
                        <div class="col-lg-8">
                            <!-- Basic info -->
                            <div class="card mb-4">
                                <div class="card-header">
                                    <h5 class="mb-0">Thông tin chung</h5>
                                </div>
                                <div class="card-body p-4">
                                    <div class="mb-3">
                                        <label class="form-label">Tên sách <span class="text-danger">*</span></label>
                                        <input type="text" th:field="*{name}" class="form-control"
                                            placeholder="Nhập tên sách..." required>
                                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                                    </div>
                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Tác giả</label>
                                            <input type="text" th:field="*{authorName}" class="form-control"
                                                placeholder="Nhập tên tác giả...">
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Danh mục <span
                                                    class="text-danger">*</span></label>
                                            <select th:field="*{category.id}" class="form-select" required>
                                                <option value="">-- Chọn Danh mục --</option>
                                                <option th:each="c : ${categories}" th:value="${c.id}"
                                                    th:text="${c.name}"></option>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Mô tả sản phẩm</label>
                                        <textarea th:field="*{description}" class="form-control" rows="8"
                                            placeholder="Nhập mô tả sản phẩm"></textarea>
                                    </div>
                                </div>
                            </div>
                            <!-- Publishing info -->
                            <div class="card mb-4">
                                <div class="card-header">
                                    <h5 class="mb-0">Chi tiết xuất bản</h5>
                                </div>
                                <div class="card-body p-4">
                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Nhà cung cấp</label>
                                            <input type="text" th:field="*{supplierName}" class="form-control"
                                                placeholder="Nhập tên Nhà cung cấp...">
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Nhà xuất bản</label>
                                            <input type="text" th:field="*{publisherName}" class="form-control"
                                                placeholder="Nhập tên NXB...">
                                        </div>
                                        <div class="col-md-4 mb-3">
                                            <label class="form-label">Năm xuất bản</label>
                                            <input type="number" th:field="*{publicationYear}" class="form-control"
                                                placeholder="VD: 2024" min="1900">
                                        </div>
                                        <div class="col-md-4 mb-3">
                                            <label class="form-label">Hình thức bìa</label>
                                            <select th:field="*{coverType}" class="form-select">
                                                <option value="Bìa Mềm">Bìa Mềm</option>
                                                <option value="Bìa Cứng">Bìa Cứng</option>
                                            </select>
                                        </div>
                                        <div class="col-md-4 mb-3">
                                            <label class="form-label">Số trang</label>
                                            <input type="number" th:field="*{pages}" class="form-control"
                                                placeholder="VD: 200" min="1">
                                        </div>
                                        <div class="col-md-4 mb-3">
                                            <label class="form-label">Ngôn ngữ</label>
                                            <select th:field="*{language}" class="form-select">
                                                <option value="Tiếng Việt">Tiếng Việt</option>
                                                <option value="Tiếng Anh">Tiếng Anh</option>
                                                <option value="Khác">Khác</option>
                                            </select>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Kích thước</label>
                                            <input type="text" th:field="*{dimensions}" class="form-control"
                                                   placeholder="VD: 20 x 14 x 2 cm">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Right Column -->
                        <div class="col-lg-4">
                            <!-- Price & Inventory -->
                            <div class="card mb-4">
                                <div class="card-header">
                                    <h5 class="mb-0">Giá & Kho hàng</h5>
                                </div>
                                <div class="card-body p-4">
                                    <div class="mb-3">
                                        <label class="form-label">Giá bán (VNĐ) <span
                                                class="text-danger">*</span></label>
                                        <div class="input-group">
                                            <input type="text" id="priceDisplay" class="form-control fw-bold text-danger"
                                                   inputmode="numeric" autocomplete="off"
                                                   placeholder="Ví dụ: 76.000" required>
                                            <input type="hidden" th:field="*{price}" id="priceHidden">
                                            <span class="input-group-text">₫</span>
                                        </div>
                                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Giá niêm yết / gốc (VNĐ)</label>
                                        <div class="input-group">
                                            <input type="text" id="originalPriceDisplay" class="form-control"
                                                   inputmode="numeric" autocomplete="off"
                                                   placeholder="Để trống nếu không giảm giá">
                                            <input type="hidden" th:field="*{originalPrice}" id="originalPriceHidden">
                                            <span class="input-group-text">₫</span>
                                        </div>
                                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('originalPrice')}" th:errors="*{originalPrice}"></div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Số lượng kho <span
                                                class="text-danger">*</span></label>
                                        <input type="number" th:field="*{quantity}" class="form-control" required
                                            min="0">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Trạng thái hiển thị</label>
                                        <select th:field="*{isHidden}" class="form-select">
                                            <option value="false">Hiển thị (Khách hàng có thể thấy)</option>
                                            <option value="true">Đang ẩn (Tạm khóa/Hết hàng)</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <!-- Image Upload -->
                            <div class="card mb-4">
                                <div class="card-header">
                                    <h5 class="mb-0">Hình ảnh</h5>
                                </div>
                                <div class="card-body p-4">
                                    <div class="text-center">
                                    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
                                        <img id="previewImg" src="#" alt="Preview">
                                        <div id="uploadPlaceholder">
                                            <i class="fas fa-cloud-upload-alt fa-3x text-secondary mb-2"></i>
                                            <p class="text-muted small mb-0">Click để tải ảnh lên (Không bắt buộc)</p>
                                        </div>
                                    </div>
                                    <input type="file" name="imageFile" id="fileInput" class="d-none" accept="image/*"
                                        onchange="previewFile()">
                                    </div>
                                    <div class="mb-0 mt-3">
                                        <label class="form-label">Ảnh phụ (gallery)</label>
                                        <div class="upload-box" style="padding: 18px;" onclick="document.getElementById('galleryInput').click()">
                                            <div id="galleryPlaceholder">
                                                <i class="fas fa-images fa-2x text-secondary mb-2"></i>
                                                <p class="text-muted small mb-0">Click để thêm ảnh phụ (tối đa 12)</p>
                                            </div>
                                            <div id="galleryPreview" class="d-flex flex-wrap gap-2 justify-content-center mt-2" style="display:none;"></div>
                                        </div>
                                        <input type="file" name="galleryFiles" id="galleryInput" class="d-none" accept="image/*" multiple onchange="previewGalleryFiles()">
                                        <div class="form-text">Chọn ảnh phụ bằng ô phía trên; xóa từng ảnh bằng nút ×. Tối đa 12 ảnh phụ.</div>
                                    </div>
                                </div>
                            </div>

                            <div class="mt-4">
                                <button type="submit" class="btn btn-primary w-100 py-3">
                                    <i class="fas fa-save me-2"></i> Lưu sản phẩm
                                </button>
                            </div>
                        </div>
                    </div>
                </form>
    <th:block layout:fragment="script">
        <script>
        function formatVndDots(raw) {
            const digits = (raw || '').toString().replace(/\D/g, '');
            if (!digits) return '';
            return digits.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
        }

        function syncMoneyInput(displayEl, hiddenEl) {
            const digits = (displayEl.value || '').toString().replace(/\D/g, '');
            displayEl.value = formatVndDots(digits);
            hiddenEl.value = digits;
        }

        function initMoneyInputs() {
            const priceDisplay = document.getElementById('priceDisplay');
            const priceHidden = document.getElementById('priceHidden');
            const originalDisplay = document.getElementById('originalPriceDisplay');
            const originalHidden = document.getElementById('originalPriceHidden');
            if (!priceDisplay || !priceHidden || !originalDisplay || !originalHidden) return;

            // Prefill if server bound values exist
            if (priceHidden.value) priceDisplay.value = formatVndDots(priceHidden.value);
            if (originalHidden.value) originalDisplay.value = formatVndDots(originalHidden.value);

            priceDisplay.addEventListener('input', () => syncMoneyInput(priceDisplay, priceHidden));
            originalDisplay.addEventListener('input', () => syncMoneyInput(originalDisplay, originalHidden));
            priceDisplay.addEventListener('blur', () => syncMoneyInput(priceDisplay, priceHidden));
            originalDisplay.addEventListener('blur', () => syncMoneyInput(originalDisplay, originalHidden));

            // Ensure hidden is correct on load
            syncMoneyInput(priceDisplay, priceHidden);
            syncMoneyInput(originalDisplay, originalHidden);
        }

        document.addEventListener('DOMContentLoaded', initMoneyInputs);

        function previewFile() {
            const preview = document.getElementById('previewImg');
            const placeholder = document.getElementById('uploadPlaceholder');
            const file = document.getElementById('fileInput').files[0];
            const reader = new FileReader();

            reader.onloadend = function () {
                preview.src = reader.result;
                preview.style.display = 'block';
                placeholder.style.display = 'none';
            }

            if (file) reader.readAsDataURL(file);
        }

        let selectedGalleryFiles = [];

        function syncGalleryInput() {
            const input = document.getElementById('galleryInput');
            if (!input) return;
            const dt = new DataTransfer();
            selectedGalleryFiles.forEach(f => dt.items.add(f));
            input.files = dt.files;
        }

        function renderGalleryPreview() {
            const preview = document.getElementById('galleryPreview');
            const placeholder = document.getElementById('galleryPlaceholder');
            if (!preview || !placeholder) return;

            preview.innerHTML = '';
            if (!selectedGalleryFiles.length) {
                preview.style.display = 'none';
                placeholder.style.display = 'block';
                return;
            }

            placeholder.style.display = 'none';
            preview.style.display = 'flex';
            selectedGalleryFiles.forEach((f, idx) => {
                const url = URL.createObjectURL(f);
                const wrap = document.createElement('div');
                wrap.className = 'gallery-thumb-wrap';

                const img = document.createElement('img');
                img.className = 'gallery-thumb';
                img.src = url;
                img.alt = f.name;
                img.onload = () => URL.revokeObjectURL(url);

                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'gallery-thumb-remove';
                btn.innerHTML = '&times;';
                btn.addEventListener('click', function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                    selectedGalleryFiles.splice(idx, 1);
                    syncGalleryInput();
                    renderGalleryPreview();
                });

                wrap.appendChild(img);
                wrap.appendChild(btn);
                preview.appendChild(wrap);
            });
        }

        function previewGalleryFiles() {
            const input = document.getElementById('galleryInput');
            if (!input) return;

            const incoming = Array.from(input.files || []);
            const merged = selectedGalleryFiles.concat(incoming);
            selectedGalleryFiles = merged.slice(0, 12);
            syncGalleryInput();
            renderGalleryPreview();
        }
        </script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.2/tinymce.min.js" referrerpolicy="origin"></script>
        <script>
        tinymce.init({
            selector: 'textarea[name="description"]',
            height: 400,
            plugins: 'advlist autolink lists link image charmap preview anchor pagebreak',
            toolbar_mode: 'floating',
            toolbar: 'undo redo | blocks | bold italic underline | alignleft aligncenter alignright alignjustify | bullist numlist outdent indent | removeformat | help',
            content_style: 'body { font-family:Helvetica,Arial,sans-serif; font-size:16px }'
        });
        </script>
    </th:block>
</div>
</body>

</html>
