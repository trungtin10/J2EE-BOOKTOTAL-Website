<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/admin_layout}">

<head>
    <meta charset="UTF-8">
    <title>Chi tiết sản phẩm</title>
    <th:block layout:fragment="css">
        <style>

        .product-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            border: 1px solid #f0f0f0;
        }

        .img-wrapper {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s;
            margin-bottom: 20px;
        }

        .img-wrapper:hover {
            transform: translateY(-5px);
        }

        .product-img {
            width: 100%;
            display: block;
        }

        .product-title {
            font-size: 2rem;
            font-weight: 800;
            color: #2c3e50;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .product-id {
            font-size: 0.9rem;
            color: #95a5a6;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .price-tag {
            font-size: 2.2rem;
            color: #e74c3c;
            font-weight: 800;
            margin-bottom: 25px;
            display: inline-block;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-right: 10px;
        }

        .badge-stock {
            background-color: #e8f5e9;
            color: #2ecc71;
        }

        .badge-sold {
            background-color: #fff3e0;
            color: #f39c12;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
            background: #fcfcfc;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #f1f1f1;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 0.85rem;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1rem;
            font-weight: 600;
            color: #34495e;
        }

        .desc-section {
            margin-top: 40px;
        }

        .desc-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 15px;
            border-left: 4px solid var(--brand, #0b1f33);
            padding-left: 15px;
        }

        .desc-content {
            color: #555;
            line-height: 1.8;
            font-size: 1rem;
            text-align: justify;
        }

        .btn-action {
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: 600;
            transition: 0.2s;
            width: 100%;
            margin-bottom: 10px;
        }

        .btn-edit {
            background-color: #3498db;
            color: white;
            border: none;
        }

        .btn-edit:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }

        .btn-delete {
            background-color: #fff;
            color: #e74c3c;
            border: 2px solid #e74c3c;
        }

        .btn-delete:hover {
            background-color: #e74c3c;
            color: white;
        }
        </style>
    </th:block>
</head>

<body>
<th:block layout:fragment="pageTitle">Chi tiết sản phẩm</th:block>

<div layout:fragment="content" class="container-fluid py-3" th:with="activePage='products'">
    <div class="admin-page-header">
        <div>
            <div class="admin-page-title"><i class="fas fa-info-circle me-2"></i>Chi tiết sản phẩm</div>
            <div class="admin-page-subtitle">Xem nhanh thông tin sản phẩm</div>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/products}" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-2"></i> Quay lại
            </a>
        </div>
    </div>

                <div class="product-card">
                    <div class="row g-5">
                        <!-- Cột Trái: Ảnh -->
                        <div class="col-lg-4">
                            <div class="img-wrapper mb-4">
                                <img th:src="@{${product.imageUrl != null ? (product.imageUrl.startsWith('http') or product.imageUrl.startsWith('/uploads/') ? product.imageUrl : '/uploads/' + product.imageUrl) : '/img/placeholder.svg'}}"
                                     class="product-img" onerror="this.src='/img/placeholder.svg'">
                            </div>

                            <div class="row g-2">
                                <div class="col-12">
                                    <a th:href="@{'/admin/products/edit/' + ${product.id}}"
                                        class="btn btn-edit btn-action d-block text-center text-decoration-none">
                                        <i class="fas fa-pen me-2"></i> Chỉnh sửa thông tin
                                    </a>
                                </div>
                                <div class="col-12">
                                    <form th:action="@{'/admin/products/delete/' + ${product.id}}" method="post">
                                        <button type="submit" class="btn btn-delete btn-action w-100"
                                            onclick="return confirm('Hành động này không thể hoàn tác. Bạn chắc chắn muốn xóa?');">
                                            <i class="fas fa-trash-alt me-2"></i> Xóa sản phẩm
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>

                        <!-- Cột Phải: Thông tin -->
                        <div class="col-lg-8">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <h1 class="product-title" th:text="${product.name}"></h1>
                                    <div class="product-id" th:text="'SKU: #' + ${product.id}"></div>
                                </div>
                                <div class="text-end">
                                    <div class="price-tag"
                                        th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                                    </div>
                                </div>
                            </div>

                            <div class="mb-4">
                                    <span class="status-badge badge-stock"><i class="fas fa-box-open me-2"></i> Tồn kho:
                                    <span th:text="${product.quantity}"></span></span>
                                <span class="status-badge badge-sold"><i class="fas fa-chart-line me-2"></i> Đã bán:
                                    N/A</span> <!-- You might need a sold count attribute -->
                            </div>

                            <div class="info-grid">
                                <div class="info-item">
                                    <span class="info-label">Nhà cung cấp</span>
                                    <span class="info-value text-primary"
                                        th:text="${product.supplierName != null ? product.supplierName : '---'}"></span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">Tác giả</span>
                                    <span class="info-value text-primary"
                                        th:text="${product.authorName != null ? product.authorName : '---'}"></span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">Nhà xuất bản</span>
                                    <span class="info-value"
                                        th:text="${product.publisherName != null ? product.publisherName : '---'}"></span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">Năm xuất bản</span>
                                    <span class="info-value"
                                        th:text="${product.publicationYear != null ? product.publicationYear : '---'}"></span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">Ngôn ngữ</span>
                                    <span class="info-value"
                                        th:text="${product.language != null ? product.language : '---'}"></span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">Danh mục</span>
                                    <span class="info-value"
                                        th:text="${product.category != null ? product.category.name : 'Chưa phân loại'}"></span>
                                </div>
                            </div>

                            <div class="desc-section">
                                <h5 class="desc-title">Giới thiệu sách</h5>
                                <div class="desc-content" style="overflow: hidden;"
                                    th:utext="${product.description != null ? product.description : 'Chưa có mô tả cho sản phẩm này.'}">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
    </div>
</body>

</html>
