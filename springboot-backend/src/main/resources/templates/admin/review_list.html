<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{admin/layout/admin_layout}">

<head>
    <title>Quản lý Đánh giá</title>
    <th:block layout:fragment="css">
        <style>
            .review-stars { color: #FFD700; }
            .admin-reply { background-color: #f0f8ff; border-left: 3px solid #0d6efd; padding: 10px; margin-top: 10px; border-radius: 4px; position: relative; }
            .btn-delete-reply { position: absolute; top: 5px; right: 5px; }
            .status-badge { padding: 4px 10px; border-radius: 999px; font-size: 0.75rem; font-weight: 700; }
            .status-pending { background-color: #fff3cd; color: #664d03; }
            .status-approved { background-color: #d1e7dd; color: #0f5132; }
        </style>
    </th:block>
</head>

<body>
    <div layout:fragment="pageTitle">Quản lý Đánh giá</div>

    <div layout:fragment="content">
        <th:block th:with="activePage='reviews'"></th:block>

        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
            <h1 class="h2"><i class="fas fa-star text-primary me-2"></i> QUẢN LÝ ĐÁNH GIÁ</h1>
        </div>

        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle me-1"></i> <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">Sản phẩm</th>
                                <th>Người đánh giá</th>
                                <th>Nội dung</th>
                                <th class="text-center">Trạng thái</th>
                                <th class="text-center">Hành động</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="review : ${reviews}">
                                <td class="ps-4">
                                    <div class="fw-bold" th:text="${review.product.name}"></div>
                                    <small class="text-muted" th:text="'#' + ${review.product.id}"></small>
                                </td>
                                <td>
                                    <div th:text="${review.user.fullName}"></div>
                                    <div class="review-stars">
                                        <span th:each="i : ${#numbers.sequence(1, review.rating)}">★</span>
                                    </div>
                                </td>
                                <td>
                                    <p th:text="${review.comment}"></p>
                                    <div th:if="${review.adminReply != null}" class="admin-reply">
                                        <strong class="text-primary">Phản hồi của Admin:</strong>
                                        <p class="mb-0" th:text="${review.adminReply}"></p>
                                        <form th:action="@{'/admin/reviews/delete-reply/' + ${review.id}}" method="POST" class="btn-delete-reply" onsubmit="return confirm('Bạn có chắc chắn muốn xóa phản hồi này?')">
                                            <button type="submit" class="btn btn-sm btn-link text-danger p-0" title="Xóa phản hồi">
                                                <i class="fas fa-times"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                                <td class="text-center">
                                    <span th:if="${review.isApproved == true}" class="status-badge status-approved">Đã duyệt</span>
                                    <span th:unless="${review.isApproved == true}" class="status-badge status-pending">Chờ duyệt</span>
                                </td>
                                <td class="text-center">
                                    <form th:unless="${review.isApproved == true}" th:action="@{'/admin/reviews/approve/' + ${review.id}}" method="POST" class="d-inline me-1" onsubmit="return confirm('Duyệt đánh giá này?');">
                                        <button type="submit" class="btn btn-sm btn-success" title="Duyệt">
                                            <i class="fas fa-check"></i> Duyệt
                                        </button>
                                    </form>
                                    <button class="btn btn-sm btn-outline-primary me-1" data-bs-toggle="modal"
                                            th:data-bs-target="'#replyModal-' + ${review.id}">
                                        <i class="fas fa-reply"></i> Phản hồi
                                    </button>
                                    <form th:action="@{'/admin/reviews/delete/' + ${review.id}}" method="POST" class="d-inline" onsubmit="return confirm('Bạn có chắc chắn muốn xóa đánh giá này?')">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">
                                            <i class="fas fa-trash"></i> Xóa
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Reply Modals -->
        <div th:each="review : ${reviews}">
            <div class="modal fade" th:id="'replyModal-' + ${review.id}" tabindex="-1">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <form th:action="@{'/admin/reviews/reply/' + ${review.id}}" method="POST">
                            <div class="modal-header">
                                <h5 class="modal-title">Phản hồi đánh giá</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <div class="mb-3">
                                    <label class="form-label">Nội dung phản hồi:</label>
                                    <textarea name="reply" class="form-control" rows="4" required th:text="${review.adminReply}"></textarea>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                                <button type="submit" class="btn btn-primary">Gửi phản hồi</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
