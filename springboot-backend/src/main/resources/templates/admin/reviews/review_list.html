<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/admin_layout}">

<head>
    <meta charset="UTF-8">
    <title>Quản lý đánh giá</title>
    <th:block layout:fragment="css">
        <style>
            .status-badge { padding: 5px 10px; border-radius: 999px; font-size: 0.8rem; font-weight: 700; }
            .status-pending { background-color: #fff3cd; color: #664d03; }
            .status-approved { background-color: #d1e7dd; color: #0f5132; }
            .admin-reply { font-size: 0.85rem; color: #52606d; background: #f8f9fa; padding: 8px; border-radius: 8px; margin-top: 6px; border-left: 3px solid var(--brand, #0b1f33); }
        </style>
    </th:block>
</head>

<body>
<th:block layout:fragment="pageTitle">Quản lý đánh giá</th:block>

<div layout:fragment="content" class="container-fluid py-3" th:with="activePage='reviews'">
    <div class="admin-page-header">
        <div>
            <div class="admin-page-title"><i class="fas fa-star me-2"></i>Quản lý đánh giá</div>
            <div class="admin-page-subtitle">Duyệt/xóa và trả lời đánh giá khách hàng</div>
        </div>
    </div>

                <div th:if="${successMessage != null or param.success != null}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="fas fa-check-circle me-1"></i> <span th:text="${successMessage ?: param.success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                <div th:if="${errorMessage != null or param.error != null}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-circle me-1"></i> <span th:text="${errorMessage ?: param.error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead>
                                    <tr>
                                        <th class="ps-3">ID</th>
                                        <th>Sản phẩm</th>
                                        <th>Người dùng</th>
                                        <th>Đánh giá</th>
                                        <th>Nội dung</th>
                                        <th>Ngày tạo</th>
                                        <th>Trạng thái</th>
                                        <th class="pe-3">Hành động</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:if="${reviews == null or reviews.empty}">
                                        <td colspan="8" class="text-center py-4 text-muted">Chưa có đánh giá nào.</td>
                                    </tr>
                                    <tr th:each="r : ${reviews}">
                                        <td class="ps-3" th:text="'#' + ${r.id}"></td>
                                        <td style="max-width: 200px;" class="text-truncate"
                                            th:title="${r.product != null ? r.product.name : ''}"
                                            th:text="${r.product != null ? r.product.name : 'Unknown Product'}"></td>
                                        <td th:text="${r.user != null ? r.user.username : 'Anonymous'}"></td>
                                        <td class="text-warning fw-bold" th:text="${r.rating} + ' ★'"></td>
                                        <td style="max-width: 350px;">
                                            <div class="text-truncate" th:title="${r.comment}" th:text="${r.comment}">
                                            </div>
                                            <div th:if="${r.adminReply != null and !r.adminReply.isEmpty()}"
                                                class="admin-reply">
                                                <strong>Admin:</strong> <span th:text="${r.adminReply}"></span>
                                            </div>
                                        </td>
                                        <td th:text="${#temporals.format(r.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                                        <td>
                                            <span th:if="${r.isApproved == true}"
                                                class="status-badge status-approved">Đã duyệt</span>
                                            <span th:unless="${r.isApproved == true}"
                                                class="status-badge status-pending">Chờ duyệt</span>
                                        </td>
                                        <td class="pe-3">
                                            <div class="btn-group">
                                                <form th:unless="${r.isApproved == true}"
                                                    th:action="@{'/admin/reviews/approve/' + ${r.id}}" method="post"
                                                    class="d-inline-block">
                                                    <button type="submit" class="btn btn-sm btn-success" title="Duyệt">
                                                        <i class="fas fa-check"></i>
                                                    </button>
                                                </form>

                                                <button type="button" class="btn btn-sm btn-primary reply-modal-trigger" title="Trả lời"
                                                    data-bs-toggle="modal" data-bs-target="#replyModal"
                                                    th:data-review-id="${r.id}"
                                                    th:data-username="${r.user != null ? r.user.username : ''}"
                                                    th:data-admin-reply="${r.adminReply != null ? r.adminReply : ''}">
                                                    <i class="fas fa-reply"></i>
                                                </button>

                                                <form th:if="${r.adminReply != null and !r.adminReply.isEmpty()}"
                                                    th:action="@{'/admin/reviews/delete-reply/' + ${r.id}}"
                                                    method="post" class="d-inline-block">
                                                    <button type="submit" class="btn btn-sm btn-secondary"
                                                        title="Xóa trả lời"
                                                        onclick="return confirm('Xóa câu trả lời này?');">
                                                        <i class="fas fa-eraser"></i>
                                                    </button>
                                                </form>

                                                <form th:action="@{'/admin/reviews/delete/' + ${r.id}}" method="post"
                                                    class="d-inline-block">
                                                    <button type="submit" class="btn btn-sm btn-danger" title="Xóa"
                                                        onclick="return confirm('Xóa đánh giá này?');">
                                                        <i class="fas fa-trash"></i>
                                                    </button>
                                                </form>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
    <!-- Modal Trả lời -->

    <div class="modal fade" id="replyModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Trả lời đánh giá của <span id="replyUsername"
                            class="fw-bold text-primary"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="replyForm" method="POST">
                    <div class="modal-body">
                        <input type="hidden" id="replyReviewId">
                        <div class="mb-3">
                            <label class="form-label">Nội dung trả lời:</label>
                            <textarea name="reply" id="replyContent" class="form-control" rows="4" required
                                placeholder="Nhập câu trả lời của Admin..."></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                        <button type="submit" class="btn btn-primary">Gửi trả lời</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <th:block layout:fragment="script">
        <script>
            document.getElementById('replyModal').addEventListener('show.bs.modal', function (event) {
                var btn = event.relatedTarget;
                if (!btn || !btn.classList.contains('reply-modal-trigger')) return;
                var id = btn.getAttribute('data-review-id');
                var username = btn.getAttribute('data-username') || '';
                var reply = btn.getAttribute('data-admin-reply') || '';
                document.getElementById('replyReviewId').value = id;
                document.getElementById('replyForm').action = '/admin/reviews/reply/' + id;
                document.getElementById('replyUsername').innerText = username;
                document.getElementById('replyContent').value = reply;
            });
        </script>
    </th:block>
</div>
</body>

</html>
