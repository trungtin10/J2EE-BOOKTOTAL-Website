<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Quản Lý Đánh Giá | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .table th {
            background-color: #f8f9fa;
            font-weight: 600;
        }

        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-pending {
            background-color: #fff3cd;
            color: #ffc107;
        }

        .status-approved {
            background-color: #d1e7dd;
            color: #198754;
        }

        .admin-reply {
            font-size: 0.85rem;
            color: #666;
            background: #f8f9fa;
            padding: 8px;
            border-radius: 6px;
            margin-top: 5px;
            border-left: 3px solid #1a1a2e;
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div th:replace="~{admin/partials/layout :: sidebar}"></div>

            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                <div
                    class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2"><i class="fas fa-star me-2"></i> QUẢN LÝ ĐÁNH GIÁ</h1>
                    <div class="d-flex align-items-center">
                        <div th:replace="~{admin/partials/layout :: topbar}"></div>
                    </div>
                </div>

                <div th:if="${successMessage != null or param.success != null}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="fas fa-check-circle me-1"></i> <span th:text="${successMessage ?: param.success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                <div th:if="${errorMessage != null or param.error != null}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-circle me-1"></i> <span th:text="${errorMessage ?: param.error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead>
                                    <tr>
                                        <th class="ps-3">ID</th>
                                        <th>Sản phẩm</th>
                                        <th>Người dùng</th>
                                        <th>Đánh giá</th>
                                        <th>Nội dung</th>
                                        <th>Ngày tạo</th>
                                        <th>Trạng thái</th>
                                        <th class="pe-3">Hành động</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:if="${reviews == null or reviews.empty}">
                                        <td colspan="8" class="text-center py-4 text-muted">Chưa có đánh giá nào.</td>
                                    </tr>
                                    <tr th:each="r : ${reviews}">
                                        <td class="ps-3" th:text="'#' + ${r.id}"></td>
                                        <td style="max-width: 200px;" class="text-truncate"
                                            th:title="${r.product != null ? r.product.name : ''}"
                                            th:text="${r.product != null ? r.product.name : 'Unknown Product'}"></td>
                                        <td th:text="${r.user != null ? r.user.username : 'Anonymous'}"></td>
                                        <td class="text-warning fw-bold" th:text="${r.rating} + ' ★'"></td>
                                        <td style="max-width: 350px;">
                                            <div class="text-truncate" th:title="${r.comment}" th:text="${r.comment}">
                                            </div>
                                            <div th:if="${r.adminReply != null and !r.adminReply.isEmpty()}"
                                                class="admin-reply">
                                                <strong>Admin:</strong> <span th:text="${r.adminReply}"></span>
                                            </div>
                                        </td>
                                        <td th:text="${#temporals.format(r.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                                        <td>
                                            <span th:if="${r.status == 'APPROVED'}"
                                                class="status-badge status-approved">Đã duyệt</span>
                                            <span th:if="${r.status != 'APPROVED'}"
                                                class="status-badge status-pending">Chờ duyệt</span>
                                        </td>
                                        <td class="pe-3">
                                            <div class="btn-group">
                                                <form th:if="${r.status != 'APPROVED'}"
                                                    th:action="@{'/admin/reviews/approve/' + ${r.id}}" method="post"
                                                    class="d-inline-block">
                                                    <button type="submit" class="btn btn-sm btn-success" title="Duyệt">
                                                        <i class="fas fa-check"></i>
                                                    </button>
                                                </form>

                                                <button class="btn btn-sm btn-primary" title="Trả lời"
                                                    th:onclick="'openReplyModal(\'' + ${r.id} + '\', \'' + (${r.user != null ? r.user.username : ''}) + '\', \'' + (${r.adminReply != null ? r.adminReply : ''}) + '\')'">
                                                    <i class="fas fa-reply"></i>
                                                </button>

                                                <form th:if="${r.adminReply != null and !r.adminReply.isEmpty()}"
                                                    th:action="@{'/admin/reviews/reply/delete/' + ${r.id}}"
                                                    method="post" class="d-inline-block">
                                                    <button type="submit" class="btn btn-sm btn-secondary"
                                                        title="Xóa trả lời"
                                                        onclick="return confirm('Xóa câu trả lời này?');">
                                                        <i class="fas fa-eraser"></i>
                                                    </button>
                                                </form>

                                                <form th:action="@{'/admin/reviews/delete/' + ${r.id}}" method="post"
                                                    class="d-inline-block">
                                                    <button type="submit" class="btn btn-sm btn-danger" title="Xóa"
                                                        onclick="return confirm('Xóa đánh giá này?');">
                                                        <i class="fas fa-trash"></i>
                                                    </button>
                                                </form>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal Trả lời -->
    <div class="modal fade" id="replyModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Trả lời đánh giá của <span id="replyUsername"
                            class="fw-bold text-primary"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form th:action="@{/admin/reviews/reply}" method="POST">
                    <div class="modal-body">
                        <input type="hidden" name="reviewId" id="replyReviewId">
                        <div class="mb-3">
                            <label class="form-label">Nội dung trả lời:</label>
                            <textarea name="replyContent" id="replyContent" class="form-control" rows="4" required
                                placeholder="Nhập câu trả lời của Admin..."></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                        <button type="submit" class="btn btn-primary">Gửi trả lời</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function openReplyModal(id, username, currentReply) {
            document.getElementById('replyReviewId').value = id;
            document.getElementById('replyUsername').innerText = username;
            document.getElementById('replyContent').value = currentReply;
            const modal = new bootstrap.Modal(document.getElementById('replyModal'));
            modal.show();
        }
    </script>
</body>

</html>
