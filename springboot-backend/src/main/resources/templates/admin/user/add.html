<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/admin_layout}">

<head>
    <meta charset="UTF-8">
    <title>Thêm người dùng</title>
    <th:block layout:fragment="css">
        <style>
            .password-wrapper { position: relative; }
            .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #6b7c93; z-index: 10; }
        </style>
    </th:block>
</head>

<body>
<th:block layout:fragment="pageTitle">Thêm người dùng</th:block>

<div layout:fragment="content" class="container-fluid py-3" th:with="activePage='users'">
    <div class="admin-page-header">
        <div>
            <div class="admin-page-title"><i class="fas fa-user-plus me-2"></i>Thêm người dùng</div>
            <div class="admin-page-subtitle">Tạo tài khoản mới</div>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/user}" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-2"></i> Quay lại
            </a>
        </div>
    </div>

                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <div class="row justify-content-center">
                        <div class="col-lg-8">
                            <div class="card">
                                <div class="card-header"><h5 class="mb-0 fw-bold">Thông tin tài khoản</h5></div>
                                <div class="card-body p-4">
                                    <form th:action="@{/admin/user/add}" method="POST" th:object="${user}">
                                        <div class="mb-3">
                                            <label class="form-label">Họ và tên</label>
                                            <input type="text" th:field="*{fullName}" class="form-control" required>
                                        </div>
                                        <div class="row">
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Tên đăng nhập <span class="text-danger">*</span></label>
                                                <input type="text" th:field="*{username}" class="form-control" required>
                                            </div>
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Email <span class="text-danger">*</span></label>
                                                <input type="email" th:field="*{email}" class="form-control" required>
                                            </div>
                                        </div>
                                        <div class="row">
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Mật khẩu <span class="text-danger">*</span></label>
                                                <div class="password-wrapper">
                                                    <input type="password" th:field="*{password}" class="form-control" id="password" required>
                                                    <i class="fas fa-eye toggle-password" onclick="togglePassword('password', this)"></i>
                                                </div>
                                            </div>
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Vai trò</label>
                                                <select th:field="*{role}" class="form-select">
                                                    <option value="user">Thành viên (User)</option>
                                                    <option value="admin">Quản trị viên (Admin)</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div class="mt-4 text-end">
                                            <button type="submit" class="btn btn-primary px-4"><i class="fas fa-save me-2"></i> Lưu</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
    <th:block layout:fragment="script">
        <script>
            function togglePassword(inputId, icon) {
                const input = document.getElementById(inputId);
                if (input.type === "password") {
                    input.type = "text";
                    icon.classList.remove("fa-eye");
                    icon.classList.add("fa-eye-slash");
                } else {
                    input.type = "password";
                    icon.classList.remove("fa-eye-slash");
                    icon.classList.add("fa-eye");
                }
            }
        </script>
    </th:block>
</div>
</body>

</html>
