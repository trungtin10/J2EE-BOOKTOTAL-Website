<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout/admin_layout}">

<head>
    <meta charset="UTF-8">
    <title>Quản lý người dùng</title>
    <th:block layout:fragment="css">
        <style>
            .role-badge { padding: 5px 10px; border-radius: 999px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; }
            .role-admin { background-color: #cff4fc; color: #055160; }
            .role-user { background-color: #d1e7dd; color: #0f5132; }
        </style>
    </th:block>
</head>

<body>
<th:block layout:fragment="pageTitle">Quản lý người dùng</th:block>

<div layout:fragment="content" class="container-fluid py-3" th:with="activePage='users'">
    <div class="admin-page-header">
        <div>
            <div class="admin-page-title"><i class="fas fa-users me-2"></i>Quản lý người dùng</div>
            <div class="admin-page-subtitle">Tìm kiếm, khóa/mở khóa và chỉnh sửa người dùng</div>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/user/add}" class="btn btn-primary">
                <i class="fas fa-plus me-1"></i> Thêm mới
            </a>
        </div>
    </div>

                <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="fas fa-check-circle me-1"></i> <span th:text="${param.success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-circle me-1"></i> <span th:text="${param.error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="fas fa-check-circle me-1"></i> <span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-circle me-1"></i> <span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <form method="get" th:action="@{/admin/user}" class="card shadow-sm mb-3">
                    <div class="card-body py-3">
                        <div class="row g-2 align-items-end">
                            <div class="col-md-6 col-lg-5">
                                <label class="form-label small text-muted mb-1">Tìm theo họ tên hoặc email</label>
                                <input type="text" name="keyword" class="form-control" th:value="${keyword}" placeholder="Nhập tên hoặc email...">
                            </div>
                            <div class="col-auto">
                                <input type="hidden" name="page" value="0">
                                <button type="submit" class="btn btn-primary"><i class="fas fa-search me-1"></i> Tìm kiếm</button>
                            </div>
                            <div class="col-auto" th:if="${keyword != null and !keyword.isEmpty()}">
                                <a th:href="@{/admin/user}" class="btn btn-outline-secondary">Xóa lọc</a>
                            </div>
                        </div>
                    </div>
                </form>

                <div class="card shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">ID</th>
                                        <th>Tên đăng nhập</th>
                                        <th>Họ tên</th>
                                        <th>Email</th>
                                        <th>Vai trò</th>
                                        <th>Trạng thái</th>
                                        <th class="text-center">Hành động</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:if="${users == null or users.isEmpty()}">
                                        <td colspan="7" class="text-center text-muted py-5">Không có người dùng phù hợp.</td>
                                    </tr>
                                    <tr th:each="u : ${users}">
                                        <td class="ps-4" th:text="'#' + ${u.id}"></td>
                                        <td class="fw-bold" th:text="${u.username}"></td>
                                        <td th:text="${u.fullName}"></td>
                                        <td th:text="${u.email}"></td>
                                        <td>
                                            <span th:if="${u.role == 'admin'}" class="role-badge role-admin">Admin</span>
                                            <span th:if="${u.role != 'admin'}" class="role-badge role-user">User</span>
                                        </td>
                                        <td>
                                            <span th:if="${u.enabled != false}" class="badge bg-success">Hoạt động</span>
                                            <span th:if="${u.enabled == false}" class="badge bg-secondary">Đã khóa</span>
                                        </td>
                                        <td class="text-center text-nowrap">
                                            <form th:if="${u.enabled != false}" th:action="@{/admin/user/set-enabled}" method="post" class="d-inline">
                                                <input type="hidden" name="id" th:value="${u.id}">
                                                <input type="hidden" name="enabled" value="false">
                                                <input type="hidden" name="page" th:value="${currentPage}">
                                                <input type="hidden" name="keyword" th:value="${keyword}">
                                                <button type="submit" class="btn btn-sm btn-outline-warning me-1" title="Khóa tài khoản"
                                                        onclick="return confirm('Khóa tài khoản này? Người dùng sẽ không đăng nhập được.');">
                                                    <i class="fas fa-user-lock"></i>
                                                </button>
                                            </form>
                                            <form th:if="${u.enabled == false}" th:action="@{/admin/user/set-enabled}" method="post" class="d-inline">
                                                <input type="hidden" name="id" th:value="${u.id}">
                                                <input type="hidden" name="enabled" value="true">
                                                <input type="hidden" name="page" th:value="${currentPage}">
                                                <input type="hidden" name="keyword" th:value="${keyword}">
                                                <button type="submit" class="btn btn-sm btn-outline-success me-1" title="Mở khóa">
                                                    <i class="fas fa-unlock"></i>
                                                </button>
                                            </form>
                                            <a th:href="@{'/admin/user/edit/' + ${u.id}}" class="btn btn-sm btn-outline-primary me-1" title="Sửa">
                                                <i class="fas fa-edit"></i>
                                            </a>
                                            <a th:href="@{'/admin/user/delete/' + ${u.id}}" class="btn btn-sm btn-outline-danger"
                                               onclick="return confirm('Bạn có chắc chắn muốn xóa người dùng này?');" title="Xóa">
                                                <i class="fas fa-trash"></i>
                                            </a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 px-4 py-3 border-top bg-light"
                             th:if="${totalPages > 1}">
                            <small class="text-muted" th:text="'Trang ' + ${currentPage + 1} + ' / ' + ${totalPages} + ' (' + ${totalElements} + ' người dùng)'"></small>
                            <nav aria-label="Phân trang">
                                <ul class="pagination pagination-sm mb-0">
                                    <li class="page-item" th:classappend="${!hasPrevious} ? 'disabled'">
                                        <a class="page-link" th:href="@{/admin/user(page=${currentPage - 1}, keyword=${keyword})}">Trước</a>
                                    </li>
                                    <li class="page-item" th:each="p : ${#numbers.sequence(0, totalPages - 1)}"
                                        th:if="${p >= currentPage - 2 and p <= currentPage + 2}"
                                        th:classappend="${p == currentPage} ? 'active'">
                                        <a class="page-link" th:href="@{/admin/user(page=${p}, keyword=${keyword})}" th:text="${p + 1}"></a>
                                    </li>
                                    <li class="page-item" th:classappend="${!hasNext} ? 'disabled'">
                                        <a class="page-link" th:href="@{/admin/user(page=${currentPage + 1}, keyword=${keyword})}">Sau</a>
                                    </li>
                                </ul>
                            </nav>
                        </div>
                    </div>
                </div>
    </div>
</body>

</html>
