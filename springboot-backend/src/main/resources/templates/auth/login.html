<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>Đăng nhập - Bookstore</title>
    <th:block layout:fragment="css"></th:block>
</head>

<body>
    <div layout:fragment="content">
        <div class="auth-page">
            <div class="auth-shell container">
                <div class="auth-card">
                    <h2 class="auth-title">Đăng nhập</h2>

                    <div th:if="${param.error}" class="alert alert-danger" role="alert">Tên đăng nhập hoặc mật khẩu không đúng.</div>
                    <div th:if="${param.logout}" class="alert alert-success" role="alert">Bạn đã đăng xuất thành công.</div>
                    <div th:if="${param.registered}" class="alert alert-success" role="alert">Đăng ký thành công! Vui lòng đăng nhập.</div>
                    <div th:if="${param.resetSuccess}" class="alert alert-success" role="alert">Đặt lại mật khẩu thành công! Vui lòng đăng nhập bằng mật khẩu mới.</div>
                    <div th:if="${successMessage}" class="alert alert-success" role="alert" th:text="${successMessage}"></div>
                    <div th:if="${success}" class="alert alert-success" role="alert" th:text="${success}"></div>

                    <form th:action="@{/login}" method="POST" id="pageLoginForm" novalidate>
                        <input type="hidden" name="returnUrl" id="pageLoginReturnUrl"
                               th:value="${param.returnUrl != null ? param.returnUrl : ''}">
                        <div class="mb-3">
                            <label class="form-label" for="loginUsername">Tên đăng nhập hoặc email</label>
                            <input type="text" class="form-control" id="loginUsername" name="username" required
                                   autocomplete="username" placeholder="Nhập tên đăng nhập hoặc email"
                                   th:value="${session.SPRING_SECURITY_LAST_USERNAME}">
                            <div class="invalid-feedback"></div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label" for="loginPassword">Mật khẩu</label>
                            <div class="password-field">
                                <input type="password" class="form-control" name="password" id="loginPassword" required
                                    autocomplete="current-password" placeholder="Nhập mật khẩu">
                                <button type="button" class="btn-toggle-password" aria-label="Hiển thị mật khẩu"
                                    aria-pressed="false">
                                    <i class="fas fa-eye" aria-hidden="true"></i>
                                </button>
                            </div>
                            <div class="invalid-feedback"></div>
                        </div>
                        <button type="submit" class="btn-auth">Đăng nhập</button>
                    </form>

                    <div class="mt-3">
                        <a class="btn btn-outline-secondary w-100" th:href="@{/oauth2/authorization/google}">
                            <i class="fab fa-google me-2"></i> Đăng nhập bằng Google
                        </a>
                    </div>

                    <div class="text-center mt-4 small">
                        <p class="text-muted mb-2">Chưa có tài khoản?
                            <a th:href="@{/register}" class="text-decoration-none fw-bold text-danger">Đăng ký ngay</a>
                        </p>
                        <p class="text-muted mb-0">
                            <a th:href="@{/forgot-password}" class="text-decoration-none fw-semibold text-secondary">Quên mật khẩu?</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="script"></th:block>
</body>

</html>
