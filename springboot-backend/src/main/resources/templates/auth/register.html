<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>Đăng ký - Bookstore</title>
    <th:block layout:fragment="css"></th:block>
</head>

<body>
    <div layout:fragment="content">
        <div class="auth-page">
            <div class="auth-shell container">
                <div class="auth-card">
                    <h2 class="auth-title">Đăng ký tài khoản</h2>

                    <div th:if="${registerError}" class="alert alert-danger" role="alert" th:text="${registerError}"></div>
                    <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>
                    <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger py-2 px-3" role="alert">
                        <ul class="mb-0 ps-3 small">
                            <li th:each="e : ${#fields.errors('*')}" th:text="${e}">Lỗi</li>
                        </ul>
                    </div>

                    <form th:action="@{/register}" th:object="${user}" method="POST" id="pageRegisterForm" novalidate>
                        <div class="mb-3">
                            <label class="form-label" for="fullName">Họ và tên</label>
                            <input type="text" class="form-control" th:field="*{fullName}" required
                                autocomplete="name" placeholder="Nguyễn Văn A">
                            <div class="invalid-feedback"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="email">Email</label>
                            <input type="email" class="form-control" th:field="*{email}" required
                                autocomplete="email" inputmode="email" placeholder="email@example.com">
                            <div class="invalid-feedback"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="username">Tên đăng nhập</label>
                            <input type="text" class="form-control" th:field="*{username}"
                                autocomplete="username" placeholder="Chỉ chữ, số và dấu _" required>
                            <div class="invalid-feedback"></div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label" for="password">Mật khẩu</label>
                            <div class="password-field">
                                <input type="password" class="form-control" th:field="*{password}" required
                                    autocomplete="new-password" placeholder="Tối thiểu 6 ký tự">
                                <button type="button" class="btn-toggle-password" aria-label="Hiển thị mật khẩu"
                                    aria-pressed="false">
                                    <i class="fas fa-eye" aria-hidden="true"></i>
                                </button>
                            </div>
                            <div class="invalid-feedback"></div>
                        </div>

                        <input type="hidden" name="role" value="user">
                        <button type="submit" class="btn-auth">Đăng ký</button>
                    </form>

                    <div class="text-center mt-4 small">
                        <p class="text-muted mb-0">Đã có tài khoản?
                            <a th:href="@{/login}" class="text-decoration-none fw-bold text-danger">Đăng nhập</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="script"></th:block>
</body>

</html>
