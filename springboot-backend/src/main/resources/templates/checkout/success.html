<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Đặt hàng thành công | BookTotal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-light">
    <div th:replace="~{partials/header :: header}"></div>

    <div class="container mt-5 mb-5 text-center">
        <div class="card shadow-sm border-0 mx-auto p-5" style="max-width: 600px;">
            <i class="fas fa-check-circle text-success mb-3" style="font-size: 5rem;"></i>
            <h2 class="fw-bold mb-3">Đặt hàng thành công!</h2>
            <p class="text-muted fs-5 mb-4">Cảm ơn bạn đã mua hàng tại BookTotal.</p>

            <div class="bg-light p-3 rounded mb-4 text-start">
                <p class="mb-2"><strong>Mã đơn hàng:</strong> <span class="text-primary" th:text="${order.id}"></span>
                </p>
                <p class="mb-2"><strong>Tổng thanh toán:</strong> <span class="fw-bold text-danger"
                        th:text="${#numbers.formatDecimal(order.finalAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                </p>
                <p class="mb-0"><strong>Phương thức TT:</strong> COD</p>
            </div>

            <p class="small text-muted mb-4">Chúng tôi sẽ sớm liên hệ với bạn để xác nhận đơn hàng và tiến hành giao
                hàng. Bạn có thể theo dõi trạng thái đơn hàng trong phần quản lý tài khoản.</p>

            <div class="d-flex justify-content-center gap-3">
                <a th:href="@{/orders}" class="btn btn-outline-secondary px-4">Xem đơn hàng</a>
                <a th:href="@{/}" class="btn btn-primary px-4" style="background-color: #C92127; border:none;">Tiếp tục
                    mua sắm</a>
            </div>
        </div>
    </div>

    <div th:replace="~{partials/footer :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
