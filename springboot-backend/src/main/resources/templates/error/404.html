<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">
<head>
    <title>Không tìm thấy trang - Bookstore</title>
</head>
<body>
    <div layout:fragment="content" class="container mt-5 mb-5 text-center">
        <div class="py-5">
            <h1 class="display-1 fw-bold text-secondary">404</h1>
            <h2 class="mb-4">Trang không tồn tại</h2>
            <p class="lead mb-5" th:text="${errorMessage}">Rất tiếc, trang bạn đang tìm kiếm không tồn tại hoặc đã bị di chuyển.</p>
            <a th:href="@{/}" class="btn btn-danger btn-lg px-5">Quay lại trang chủ</a>
        </div>
    </div>
</body>
</html>
