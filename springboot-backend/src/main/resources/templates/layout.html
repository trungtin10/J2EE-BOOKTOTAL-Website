<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title layout:title-pattern="$CONTENT_TITLE - Bookstore">Bookstore - Thế giới sách</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <link rel="stylesheet" th:href="@{/css/responsive.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <th:block layout:fragment="css"></th:block>
</head>

<body>
    <!-- Header & Menu -->
    <header th:replace="~{partials/header :: header}"></header>

    <!-- Nội dung chính -->
    <main>
        <div layout:fragment="content"></div>
    </main>

    <!-- Footer -->
    <footer th:replace="~{partials/footer :: footer}"></footer>

    <!-- Popup đăng nhập (dùng chung mọi trang dùng layout) -->
    <div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered px-2 mx-auto" style="max-width: 540px;">
            <div class="modal-content login-modal-content">
                <button type="button" class="btn-close login-modal-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
                <div class="modal-body login-modal-body">
                    <h2 class="login-modal-title" id="loginModalLabel">ĐĂNG NHẬP</h2>

                    <div class="alert alert-danger py-2 px-3 small mb-3" th:if="${param.error}"
                         id="loginModalErrorAlert" role="alert">
                        Tên đăng nhập hoặc mật khẩu không đúng.
                    </div>

                    <form th:action="@{/login}" method="post" id="modalLoginForm" novalidate>
                        <input type="hidden" name="returnUrl" id="loginReturnUrl" value="">

                        <div class="mb-3">
                            <label class="form-label login-modal-label" for="modalLoginUsername">Tên đăng nhập</label>
                            <input type="text" class="form-control login-modal-input" id="modalLoginUsername" name="username"
                                   required autocomplete="username" placeholder=""
                                   th:value="${session.SPRING_SECURITY_LAST_USERNAME}">
                            <div class="invalid-feedback"></div>
                        </div>

                        <div class="mb-2">
                            <label class="form-label login-modal-label" for="modalLoginPassword">Mật khẩu</label>
                            <div class="password-field login-modal-password">
                                <input type="password" class="form-control login-modal-input" id="modalLoginPassword" name="password"
                                       required autocomplete="current-password" placeholder="">
                                <button type="button" class="btn-toggle-password login-modal-eye" aria-label="Hiển thị mật khẩu" aria-pressed="false">
                                    <i class="fas fa-eye" aria-hidden="true"></i>
                                </button>
                            </div>
                            <div class="invalid-feedback"></div>
                        </div>

                        <div class="d-flex justify-content-end mb-3">
                            <a th:href="@{/forgot-password}" class="login-modal-link">Quên mật khẩu?</a>
                        </div>

                        <button type="submit" class="btn login-modal-submit">Đăng nhập</button>
                    </form>

                    <div class="text-center mt-3">
                        <a class="btn btn-outline-secondary w-100"
                           th:href="@{/oauth2/authorization/google}">
                            <i class="fab fa-google me-2"></i> Đăng nhập bằng Google
                        </a>
                    </div>

                    <div class="text-center mt-3">
                        <span class="text-muted">Chưa có tài khoản?</span>
                        <a th:href="@{/register}" class="login-modal-link fw-bold ms-1"
                           onclick="event.preventDefault(); bootstrap.Modal.getOrCreateInstance(document.getElementById('loginModal')).hide(); openRegisterModal();">
                            Đăng ký ngay
                        </a>
                    </div>
                    <div class="text-center mt-2">
                        <a th:href="@{/login}" class="login-modal-link login-modal-link-muted">Mở trang đăng nhập đầy đủ</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Popup đăng ký (match design) -->
    <div class="modal fade" id="registerModal" tabindex="-1" aria-labelledby="registerModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered px-2 mx-auto" style="max-width: 540px;">
            <div class="modal-content login-modal-content">
                <button type="button" class="btn-close login-modal-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
                <div class="modal-body login-modal-body">
                    <h2 class="login-modal-title" id="registerModalLabel">ĐĂNG KÝ</h2>

                    <form th:action="@{/register}" method="post" id="modalRegisterForm" novalidate>
                        <input type="hidden" name="returnUrl" id="registerReturnUrl" value="">
                        <input type="hidden" name="role" value="user">

                        <div class="mb-3">
                            <label class="form-label login-modal-label" for="modalRegisterFullName">Họ và tên</label>
                            <input type="text" class="form-control login-modal-input" id="modalRegisterFullName" name="fullName"
                                   required autocomplete="name" placeholder="">
                            <div class="invalid-feedback"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label login-modal-label" for="modalRegisterEmail">Email</label>
                            <input type="email" class="form-control login-modal-input" id="modalRegisterEmail" name="email"
                                   required autocomplete="email" inputmode="email" placeholder="">
                            <div class="invalid-feedback"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label login-modal-label" for="modalRegisterUsername">Tên đăng nhập</label>
                            <input type="text" class="form-control login-modal-input" id="modalRegisterUsername" name="username"
                                   required autocomplete="username" placeholder="">
                            <div class="invalid-feedback"></div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label login-modal-label" for="modalRegisterPassword">Mật khẩu</label>
                            <div class="password-field login-modal-password">
                                <input type="password" class="form-control login-modal-input" id="modalRegisterPassword" name="password"
                                       required autocomplete="new-password" placeholder="">
                                <button type="button" class="btn-toggle-password login-modal-eye" aria-label="Hiển thị mật khẩu" aria-pressed="false">
                                    <i class="fas fa-eye" aria-hidden="true"></i>
                                </button>
                            </div>
                            <div class="invalid-feedback"></div>
                        </div>

                        <button type="submit" class="btn login-modal-submit">Đăng ký</button>
                    </form>

                    <div class="text-center mt-3">
                        <span class="text-muted">Đã có tài khoản?</span>
                        <a th:href="@{/login}" class="login-modal-link fw-bold ms-1"
                           onclick="event.preventDefault(); bootstrap.Modal.getOrCreateInstance(document.getElementById('registerModal')).hide(); openLoginModal();">
                            Đăng nhập ngay
                        </a>
                    </div>
                    <div class="text-center mt-2">
                        <a th:href="@{/register}" class="login-modal-link login-modal-link-muted">Mở trang đăng ký đầy đủ</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script th:src="@{/js/storefront-image-url.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:src="@{/js/auth-forms.js}"></script>
    <script th:src="@{/js/cart-storage.js}"></script>

    <script>
        function openLoginModal(forcedReturnUrl) {
            try {
                var loginEl = document.getElementById('loginModal');
                if (!loginEl) {
                    window.location.href = '/login';
                    return;
                }
                var path = forcedReturnUrl ? forcedReturnUrl : (function () {
                    var p = new URLSearchParams(window.location.search);
                    p.delete('error');
                    var q = p.toString();
                    return window.location.pathname + (q ? '?' + q : '');
                })();
                var returnUrlInput = document.getElementById('loginReturnUrl');
                if (returnUrlInput) {
                    returnUrlInput.value = path;
                }
                if (typeof bootstrap === 'undefined' || !bootstrap.Modal) {
                    window.location.href = '/login';
                    return;
                }
                bootstrap.Modal.getOrCreateInstance(loginEl).show();
            } catch (e) {
                window.location.href = '/login';
            }
        }

        function openRegisterModal() {
            try {
                var regEl = document.getElementById('registerModal');
                if (!regEl) {
                    window.location.href = '/register';
                    return;
                }
                var path = window.location.pathname + window.location.search;
                var returnUrlInput = document.getElementById('registerReturnUrl');
                if (returnUrlInput) {
                    returnUrlInput.value = path;
                }
                if (typeof bootstrap === 'undefined' || !bootstrap.Modal) {
                    window.location.href = '/register';
                    return;
                }
                bootstrap.Modal.getOrCreateInstance(regEl).show();
            } catch (e) {
                window.location.href = '/register';
            }
        }

        /** Gỡ backdrop/modal-open kẹt (chặn toàn trang, không click được). */
        function cleanupStaleModalChrome() {
            var openModal = document.querySelector('.modal.show');
            if (!openModal) {
                document.querySelectorAll('.modal-backdrop').forEach(function (el) { el.remove(); });
                document.body.classList.remove('modal-open');
                document.body.style.removeProperty('overflow');
                document.body.style.removeProperty('padding-right');
            }
        }

        document.addEventListener('DOMContentLoaded', function () {
            cleanupStaleModalChrome();
            if (typeof window.initHeaderNotifications === 'function') {
                window.initHeaderNotifications();
            }
            const urlParams = new URLSearchParams(window.location.search);
            // Link cũ ?loginError=1 — chuyển sang trang /login?error=true (không mở popup)
            if (urlParams.has('loginError')) {
                let ret = window.location.pathname;
                const p = new URLSearchParams(window.location.search);
                p.delete('loginError');
                const q = p.toString();
                if (q) {
                    ret += '?' + q;
                }
                window.location.replace('/login?error=true&returnUrl=' + encodeURIComponent(ret));
                return;
            }

            // Đăng nhập sai từ popup: server redirect về trang hiện tại + ?error=true — mở modal và gọn URL.
            if (urlParams.has('error') && window.location.pathname !== '/login') {
                openLoginModal();
                urlParams.delete('error');
                const newQs = urlParams.toString();
                const newUrl = window.location.pathname + (newQs ? '?' + newQs : '');
                if (window.history && window.history.replaceState) {
                    window.history.replaceState({}, '', newUrl);
                }
            }

            // Sau khi đăng ký từ popup thành công: đóng đăng ký -> mở đăng nhập ngay trên trang hiện tại
            if (urlParams.has('registerSuccess')) {
                const regEl = document.getElementById('registerModal');
                if (regEl && typeof bootstrap !== 'undefined' && bootstrap.Modal) {
                    try {
                        bootstrap.Modal.getOrCreateInstance(regEl).hide();
                    } catch (e) { /* ignore */ }
                }
                openLoginModal();

                // Clean URL để tránh reopen khi refresh
                urlParams.delete('registerSuccess');
                const newQs = urlParams.toString();
                const newUrl = window.location.pathname + (newQs ? '?' + newQs : '');
                if (window.history && window.history.replaceState) {
                    window.history.replaceState({}, '', newUrl);
                }

                if (window.Swal) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Đăng ký thành công',
                        text: 'Vui lòng đăng nhập để tiếp tục.',
                        timer: 2200,
                        showConfirmButton: false
                    });
                }
            }
        });
    </script>
    <th:block layout:fragment="script"></th:block>
</body>
</html>
