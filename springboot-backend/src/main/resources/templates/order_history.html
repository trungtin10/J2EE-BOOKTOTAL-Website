<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>Lịch sử đơn hàng - BookTotal</title>
    <th:block layout:fragment="css">
        <style>
            .order-card { border-radius: 10px; border-left: 5px solid #C92127; transition: 0.3s; }
            .order-card:hover { transform: translateX(5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
            .status-badge { font-size: 0.8rem; padding: 5px 12px; border-radius: 20px; }
            .mini-track { display: flex; align-items: center; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
            .mini-track .dot { width: 10px; height: 10px; border-radius: 50%; background: #dee2e6; }
            .mini-track .dot.on { background: #198754; }
            .mini-track .dot.current { background: #C92127; box-shadow: 0 0 0 3px rgba(201,33,39,.25); }
            .mini-track .lbl { font-size: 0.72rem; color: #6c757d; margin-left: 4px; }
        </style>
    </th:block>
</head>

<body>
    <div layout:fragment="content">
        <div class="container py-5">
            <nav aria-label="breadcrumb" class="mb-4">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}">Trang chủ</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/profile}">Hồ sơ</a></li>
                    <li class="breadcrumb-item active">Lịch sử đơn hàng</li>
                </ol>
            </nav>

            <h2 class="mb-4 fw-bold"><i class="fas fa-history me-2 text-danger"></i>Lịch sử đơn hàng</h2>

            <div th:if="${orders == null or orders.empty}" class="text-center py-5">
                <img src="https://cdni.iconscout.com/illustration/premium/thumb/empty-cart-2130356-1800917.png" style="width: 200px;" alt="Empty">
                <p class="mt-3 text-muted">Bạn chưa có đơn hàng nào.</p>
                <a th:href="@{/products}" class="btn btn-danger mt-2">Mua sắm ngay</a>
            </div>

            <div th:if="${orders != null and !orders.empty}" class="row g-4">
                <div th:each="order : ${orders}" class="col-12">
                    <div class="card order-card shadow-sm border-0">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                                <div>
                                    <h5 class="fw-bold mb-1" th:text="'Đơn hàng #' + ${order.id}"></h5>
                                    <p class="text-muted small mb-0">
                                        <i class="far fa-calendar-alt me-1"></i>
                                        Ngày đặt: <span th:text="${order.orderDate != null ? #temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm') : '—'}"></span>
                                    </p>
                                </div>
                                <div class="text-md-end">
                                    <span th:if="${order.customerOrderCancelled}" class="badge status-badge mb-2 bg-danger"
                                          th:text="${order.customerProgressPhaseLabel}">Đã hủy</span>
                                    <span th:if="${!order.customerOrderCancelled}"
                                          th:class="'badge status-badge mb-2 ' + 
                                          (${order.customerProgressStep == 1} ? 'bg-warning text-dark' : 
                                          (${order.customerProgressStep == 3} ? 'bg-success' : 'bg-primary'))"
                                          th:text="${order.customerProgressPhaseLabel}"></span>
                                    <div class="h5 fw-bold text-danger mb-0" th:text="${#numbers.formatDecimal(order.finalTotal, 0, 'COMMA', 0, 'POINT')} + ' đ'"></div>
                                    <div th:if="${!order.customerOrderCancelled}" class="mini-track justify-content-md-end">
                                        <span class="dot" th:classappend="${(order.customerProgressStep >= 1 ? ' on' : '') + (order.customerProgressStep == 1 ? ' current' : '')}"></span>
                                        <span class="dot" th:classappend="${(order.customerProgressStep >= 2 ? ' on' : '') + (order.customerProgressStep == 2 ? ' current' : '')}"></span>
                                        <span class="dot" th:classappend="${(order.customerProgressStep >= 3 ? ' on' : '') + (order.customerProgressStep == 3 ? ' current' : '')}"></span>
                                        <span class="lbl d-none d-sm-inline">Chờ xác nhận → Đang giao → Hoàn thành</span>
                                    </div>
                                </div>
                                <div>
                                    <a th:href="@{'/profile/orders/' + ${order.id}}" class="btn btn-outline-dark btn-sm">Chi tiết</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
