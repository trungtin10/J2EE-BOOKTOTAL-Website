<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>Đặt hàng thành công - Bookstore</title>
    <th:block layout:fragment="css">
        <style>
            body {
                background-color: #f0f2f5;
                font-family: 'Segoe UI', sans-serif;
                display: flex;
                flex-direction: column;
                min-height: 100vh;
            }

            .success-wrapper {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 60px 20px;
            }

            .success-card {
                background: white;
                border-radius: 16px;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
                max-width: 560px;
                width: 100%;
                padding: 50px 40px;
                text-align: center;
            }

            .success-icon-wrap {
                width: 90px;
                height: 90px;
                background: linear-gradient(135deg, #28a745, #20c997);
                border-radius: 50%;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 25px;
                animation: pulse 0.5s ease-out;
            }

            @keyframes pulse {
                0% { transform: scale(0.5); opacity: 0; }
                100% { transform: scale(1); opacity: 1; }
            }

            .success-icon-wrap i {
                font-size: 2.5rem;
                color: white;
            }

            .success-title {
                font-size: 1.8rem;
                font-weight: 800;
                color: #28a745;
                margin-bottom: 10px;
            }

            .success-subtitle {
                color: #777;
                font-size: 1rem;
                line-height: 1.6;
                margin-bottom: 25px;
            }

            .order-id-badge {
                display: inline-block;
                background: #f8f9fa;
                border: 2px solid #28a745;
                border-radius: 8px;
                padding: 12px 24px;
                font-size: 1.1rem;
                font-weight: 700;
                color: #333;
                margin-bottom: 30px;
                letter-spacing: 0.5px;
            }

            .order-id-badge span {
                color: #28a745;
            }

            .action-buttons {
                display: flex;
                gap: 12px;
                justify-content: center;
                flex-wrap: wrap;
            }

            .btn-history {
                background-color: #1a1a2e;
                color: white;
                padding: 12px 24px;
                border-radius: 8px;
                font-weight: 700;
                text-decoration: none;
                font-size: 0.95rem;
                transition: 0.2s;
                display: inline-flex;
                align-items: center;
                gap: 8px;
            }

            .btn-history:hover {
                background-color: #2c2c4e;
                color: white;
                transform: translateY(-1px);
            }

            .btn-continue {
                background-color: #C92127;
                color: white;
                padding: 12px 24px;
                border-radius: 8px;
                font-weight: 700;
                text-decoration: none;
                font-size: 0.95rem;
                transition: 0.2s;
                display: inline-flex;
                align-items: center;
                gap: 8px;
            }

            .btn-continue:hover {
                background-color: #a11b20;
                color: white;
                transform: translateY(-1px);
            }

            .steps-hint {
                margin-top: 30px;
                padding-top: 25px;
                border-top: 1px solid #eee;
            }

            .steps-hint p {
                font-size: 0.85rem;
                color: #999;
                margin-bottom: 8px;
            }

            .step-track {
                display: flex;
                justify-content: center;
                gap: 0;
                margin-top: 15px;
                position: relative;
            }

            .step-track::before {
                content: '';
                position: absolute;
                top: 14px;
                left: calc(50% - 115px);
                width: 230px;
                height: 2px;
                background: #28a745;
            }

            .step-dot {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 6px;
                width: 80px;
            }

            .dot {
                width: 28px;
                height: 28px;
                border-radius: 50%;
                background: #28a745;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 0.75rem;
                color: white;
                font-weight: 700;
            }

            .dot-label {
                font-size: 0.7rem;
                color: #555;
                text-align: center;
            }
        </style>
    </th:block>
</head>

<body>
    <div layout:fragment="content">
        <div class="success-wrapper">
            <div class="success-card">
                <div class="success-icon-wrap">
                    <i class="fas fa-check"></i>
                </div>

                <h1 class="success-title">Đặt hàng thành công!</h1>
                <p class="success-subtitle">
                    Cảm ơn bạn đã tin tưởng mua sắm tại <b>BOOKTOTAL</b>.<br>
                    Đơn hàng của bạn đã được ghi nhận và sẽ sớm được xử lý.
                </p>

                <div class="order-id-badge">
                    Mã đơn hàng: <span th:text="'#' + ${orderId}">---</span>
                </div>

                <div class="action-buttons">
                    <a th:href="@{/orders}" class="btn-history">
                        <i class="fas fa-box-open"></i> Theo dõi đơn hàng
                    </a>
                    <a th:href="@{/}" class="btn-continue">
                        <i class="fas fa-shopping-bag"></i> Tiếp tục mua sắm
                    </a>
                </div>

                <div class="steps-hint">
                    <p>Trạng thái đơn hàng của bạn</p>
                    <div class="step-track">
                        <div class="step-dot">
                            <div class="dot"><i class="fas fa-check fa-xs"></i></div>
                            <div class="dot-label">Đã đặt</div>
                        </div>
                        <div class="step-dot">
                            <div class="dot" style="background:#aaa;"><i class="fas fa-ellipsis-h fa-xs"></i></div>
                            <div class="dot-label">Xác nhận</div>
                        </div>
                        <div class="step-dot">
                            <div class="dot" style="background:#aaa;"><i class="fas fa-ellipsis-h fa-xs"></i></div>
                            <div class="dot-label">Vận chuyển</div>
                        </div>
                        <div class="step-dot">
                            <div class="dot" style="background:#aaa;"><i class="fas fa-ellipsis-h fa-xs"></i></div>
                            <div class="dot-label">Hoàn thành</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
