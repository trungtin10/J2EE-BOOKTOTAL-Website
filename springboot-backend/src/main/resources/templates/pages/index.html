<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Trang chủ BookTotal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .book-card {
            transition: transform 0.3s, box-shadow 0.3s;
            border: none;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            background: white;
            height: 100%;
        }

        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08) !important;
        }

        .card-img-top {
            height: 260px;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .book-card:hover .card-img-top {
            transform: scale(1.03);
        }

        .card-body {
            padding: 12px;
            text-align: left;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 42px;
            line-height: 1.4;
        }

        .card-title:hover {
            color: #C92127;
        }

        .price-tag {
            font-size: 1.1rem;
            color: #C92127;
            font-weight: 700;
            display: block;
            margin-top: 5px;
        }

        .rating-sold {
            display: flex;
            align-items: center;
            font-size: 0.8rem;
            color: #777;
            margin-top: 8px;
        }

        .stars {
            color: #FFD700;
            margin-right: 5px;
        }

        a.product-link {
            text-decoration: none;
            color: inherit;
            display: block;
            height: 100%;
        }

        .section-title {
            position: relative;
            padding-bottom: 15px;
            margin-bottom: 25px;
            font-weight: 700;
            color: #333;
            text-transform: uppercase;
            font-size: 1.4rem;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 80px;
            height: 3px;
            background-color: #C92127;
        }

        .empty-category {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .empty-icon {
            font-size: 4rem;
            color: #ddd;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div th:replace="~{partials/header :: header}"></div>

    <div class="container mb-5 mt-4" th:if="${param.search == null}">
        <div class="p-5 mb-4 bg-dark rounded-3 text-white"
            style="background: linear-gradient(45deg, #1a1a2e, #16213e);">
            <div class="container-fluid py-3">
                <h1 class="display-5 fw-bold">Chào mừng đến với BookTotal</h1>
                <p class="col-md-8 fs-4">Khám phá thế giới tri thức qua hàng ngàn đầu sách hấp dẫn.</p>
                <a th:href="@{/products}" class="btn btn-warning btn-lg">Xem ngay</a>
            </div>
        </div>
    </div>

    <div class="container pb-5 mt-4">

        <h3 class="section-title" th:if="${param.search != null}">Kết quả tìm kiếm cho: "<span class="text-danger"
                th:text="${param.search}"></span>"</h3>
        <h3 class="section-title" th:if="${param.search == null}">Sách Bán Chạy Nhất</h3>

        <div th:if="${bestSellers != null and !bestSellers.empty}"
            class="row row-cols-2 row-cols-md-4 row-cols-lg-5 g-3">
            <div class="col" th:each="item : ${bestSellers}">
                <a th:href="@{'/product/' + ${item.id}}" class="product-link">
                    <div class="card book-card shadow-sm">
                        <div style="overflow: hidden;">
                            <img th:src="${item.imageUrl != null ? item.imageUrl : '/images/default.jpg'}"
                                class="card-img-top" th:alt="${item.name}" onerror="this.src='/images/default.jpg'">
                        </div>

                        <div class="card-body">
                            <h5 class="card-title" th:title="${item.name}" th:text="${item.name}"></h5>
                            <span class="price-tag"
                                th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                            <div class="rating-sold">
                                <div class="stars">
                                    <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i
                                        class="fas fa-star"></i><i class="fas fa-star-half-alt"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </a>
            </div>
        </div>

        <div th:if="${bestSellers == null or bestSellers.empty}" class="empty-category">
            <i class="fas fa-box-open empty-icon"></i>
            <h4 class="text-muted mb-3">Chưa có sản phẩm nào</h4>
            <a th:href="@{/products}" class="btn btn-outline-primary mt-3">Xem tất cả sách</a>
        </div>

        <!-- Sách Mới -->
        <h3 class="section-title mt-5" th:if="${param.search == null}">Sách Mới Phát Hành</h3>
        <div th:if="${newArrivals != null and !newArrivals.empty and param.search == null}"
            class="row row-cols-2 row-cols-md-4 row-cols-lg-5 g-3">
            <div class="col" th:each="item : ${newArrivals}">
                <a th:href="@{'/product/' + ${item.id}}" class="product-link">
                    <div class="card book-card shadow-sm">
                        <div style="overflow: hidden;">
                            <img th:src="${item.imageUrl != null ? item.imageUrl : '/images/default.jpg'}"
                                class="card-img-top" th:alt="${item.name}" onerror="this.src='/images/default.jpg'">
                        </div>

                        <div class="card-body">
                            <h5 class="card-title" th:title="${item.name}" th:text="${item.name}"></h5>
                            <span class="price-tag"
                                th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                            <div class="rating-sold">
                                <div class="stars">
                                    <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i
                                        class="fas fa-star"></i><i class="fas fa-star-half-alt"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <div th:replace="~{partials/footer :: footer}"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
