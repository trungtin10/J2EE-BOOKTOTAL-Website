<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Cổng thanh toán - Bookstore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .payment-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .logo {
            height: 50px;
            margin-bottom: 20px;
        }

        .onepay-logo {
            width: 64px;
            height: 64px;
            background: #C92127;
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
            box-shadow: 0 8px 22px rgba(201, 33, 39, 0.22);
            font-weight: 900;
            letter-spacing: 0.02em;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
        }

        .qr-code {
            width: 250px;
            height: 250px;
            margin: 20px 0;
            border: 1px solid #eee;
            padding: 10px;
        }

        .amount {
            font-size: 1.5rem;
            font-weight: 800;
            color: #C92127;
            margin-bottom: 10px;
        }

        .timer {
            font-size: 0.9rem;
            color: #777;
            margin-bottom: 20px;
        }

        .btn-confirm {
            background-color: #28a745;
            color: white;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .btn-cancel {
            background-color: #dc3545;
            color: white;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <div class="payment-card">
        <div th:if="${method == 'ONEPAY' || method == 'MOMO'}">
                <div class="onepay-logo" aria-hidden="true">OP</div>
            <h4>Thanh toán qua OnePAY</h4>
        </div>
        <div th:if="${method == 'VNPAY'}">
            <img src="https://vinadesign.vn/uploads/images/2023/05/vnpay-logo-vinadesign-25-12-57-55.jpg" class="logo"
                alt="VNPAY">
            <h4>Thanh toán qua VNPAY</h4>
        </div>

        <p>Đơn hàng: <b th:text="'#' + ${orderId}"></b></p>
        <div class="amount" th:text="${#numbers.formatDecimal(amount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></div>

        <div th:if="${onepayError != null}" class="alert alert-danger small text-start mt-3" th:text="${onepayError}"></div>
        <div th:if="${momoError != null}" class="alert alert-danger small text-start mt-3" th:text="${momoError}"></div>
        <div th:if="${vnpayError != null}" class="alert alert-danger small text-start mt-3" th:text="${vnpayError}"></div>

        <!-- Sử dụng ảnh qrck.jpg cho VNPAY, API QR cho MOMO -->
        <img th:if="${method == 'VNPAY'}" th:src="@{/images/qrck.jpg}" class="qr-code" alt="VNPAY QR">
        <img th:if="${method == 'MOMO'}"
            th:src="@{'https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=PAYMENT_MOMO_' + ${orderId} + '_' + ${amount}}"
            class="qr-code" alt="MOMO QR">

        <p th:if="${method == 'MOMO'}" class="small text-muted">Vui lòng mở ứng dụng <span th:text="${method}"></span> và quét mã QR để thanh toán.</p>
        <div class="timer">Giao dịch hết hạn sau: <span id="countdown">10:00</span></div>

        <form id="confirmForm" th:action="@{/payment/confirm}" method="POST">
            <input type="hidden" name="orderId" th:value="${orderId}">
            <input type="hidden" name="status" value="SUCCESS">
            <button type="button" class="btn-confirm" onclick="confirmPayment()">XÁC NHẬN ĐÃ THANH TOÁN</button>
        </form>

        <form th:action="@{/payment/confirm}" method="POST">
            <input type="hidden" name="orderId" th:value="${orderId}">
            <input type="hidden" name="status" value="FAILED">
            <button type="submit" class="btn-cancel">HỦY GIAO DỊCH</button>
        </form>
    </div>

    <!-- The original EJS used SweetAlert2 without Thymeleaf syntax so we just preserve the logic -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        let time = 600; // 10 minutes
        const countdownEl = document.getElementById('countdown');

        setInterval(() => {
            const minutes = Math.floor(time / 60);
            let seconds = time % 60;
            seconds = seconds < 10 ? '0' + seconds : seconds;
            countdownEl.innerHTML = `${minutes}:${seconds}`;
            if (time > 0) time--;
        }, 1000);

        function confirmPayment() {
            Swal.fire({
                title: 'Đã ghi nhận thông tin',
                text: "Hệ thống đã lưu lại thông tin chuyển khoản. Chúng tôi sẽ gửi thông tin đơn hàng cũng như xác nhận đã chuyển khoản qua email của bạn ngay khi nhận được tiền.",
                icon: 'success',
                confirmButtonColor: '#28a745',
                confirmButtonText: 'Đồng ý'
            }).then((result) => {
                if (result.isConfirmed) {
                    document.getElementById('confirmForm').submit();
                }
            });
        }
        /*]]>*/
    </script>
</body>

</html>
