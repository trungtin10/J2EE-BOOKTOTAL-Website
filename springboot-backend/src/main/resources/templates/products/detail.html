<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title th:text="${product.name} + ' | BookTotal'"></title>
    <th:block layout:fragment="css">
        <style>
            .product-img {
            width: 100%;
            max-width: 400px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .product-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #333;
        }

        .product-price {
            font-size: 2rem;
            color: #C92127;
            font-weight: 800;
        }

        .btn-add-cart {
            background-color: #C92127;
            color: white;
            border: none;
            padding: 12px 30px;
            font-weight: 700;
            border-radius: 5px;
            font-size: 1.1rem;
        }

        .btn-add-cart:hover {
            background-color: #a11b20;
            color: white;
        }

        .quantity-input {
            width: 80px;
            text-align: center;
        }

        .info-table th {
            width: 150px;
            color: #555;
            font-weight: 500;
        }
        </style>
    </th:block>
</head>

<body>
    <div layout:fragment="content">
        <div class="container mt-5 mb-5">
        <div class="row bg-white p-4 rounded shadow-sm">
            <div class="col-md-5 text-center mb-4 mb-md-0">
                <img th:src="@{${product.imageUrl != null ? (product.imageUrl.startsWith('http') or product.imageUrl.startsWith('/uploads/') ? product.imageUrl : '/uploads/' + product.imageUrl) : '/uploads/default.jpg'}}" class="product-img"
                    th:alt="${product.name}" onerror="this.src='/uploads/default.jpg'">
            </div>
            <div class="col-md-7">
                <h1 class="product-title" th:text="${product.name}"></h1>
                <div class="mb-3 text-muted">Mã sản phẩm: <span th:text="${product.id}"></span></div>

                <div class="product-price mb-4"
                    th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></div>

                <div class="d-flex align-items-center mb-4">
                    <label class="me-3 fw-bold">Số lượng:</label>
                    <input type="number" id="qty_input" class="form-control quantity-input" value="1" min="1"
                        th:max="${product.quantity > 0 ? product.quantity : 1}">
                    <span class="ms-3 text-muted" th:if="${product.quantity > 0}"
                        th:text="'(Còn ' + ${product.quantity} + ' sản phẩm)'"></span>
                    <span class="ms-3 text-danger fw-bold" th:if="${product.quantity <= 0}">Hết hàng</span>
                </div>

                <div>
                    <button class="btn btn-add-cart" th:disabled="${product.quantity <= 0}"
                        th:onclick="'addToCart(' + ${product.id} + ')'">
                        <i class="fas fa-cart-plus me-2"></i> Thêm vào giỏ hàng
                    </button>
                </div>

                <div class="mt-5">
                    <ul class="nav nav-tabs" id="myTab" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active fw-bold" data-bs-toggle="tab" data-bs-target="#desc"
                                type="button" role="tab" style="color:#C92127">Giới thiệu sách</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link fw-bold text-dark" data-bs-toggle="tab" data-bs-target="#details"
                                type="button" role="tab">Thông tin chi tiết</button>
                        </li>
                    </ul>
                    <div class="tab-content pt-4" id="myTabContent">
                        <div class="tab-pane fade show active" id="desc" role="tabpanel">
                            <div th:utext="${product.description != null ? product.description : 'Đang cập nhật...'}">
                            </div>
                        </div>
                        <div class="tab-pane fade" id="details" role="tabpanel">
                            <table class="table table-bordered info-table">
                                <tbody>
                                    <tr>
                                        <th>Năm xuất bản</th>
                                        <td th:text="${product.publicationYear}"></td>
                                    </tr>
                                    <tr>
                                        <th>Số trang</th>
                                        <td th:text="${product.pages}"></td>
                                    </tr>
                                    <tr>
                                        <th>Loại bìa</th>
                                        <td th:text="${product.coverType}"></td>
                                    </tr>
                                    <tr>
                                        <th>Ngôn ngữ</th>
                                        <td th:text="${product.language}"></td>
                                    </tr>
                                    <tr>
                                        <th>Kích thước</th>
                                        <td th:text="${product.dimensions}"></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="script">
        <script>
            function addToCart(productId) {
                const qty = document.getElementById('qty_input').value;
                const params = new URLSearchParams();
                params.append('productId', productId);
                params.append('quantity', qty);

                fetch('/cart/add', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: params
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        // Cập nhật dropdown
                        if (typeof refreshCartDropdownHeader === 'function') refreshCartDropdownHeader();
                        
                        // Thông báo
                        Swal.fire({
                            icon: 'success',
                            title: 'Thành công',
                            text: 'Đã thêm sản phẩm vào giỏ hàng',
                            timer: 2000,
                            showConfirmButton: false
                        });
                    } else {
                        Swal.fire({
                            icon: 'error',
                            title: 'Lỗi',
                            text: data.message
                        });
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    Swal.fire({
                        icon: 'error',
                        title: 'Lỗi kết nối',
                        text: 'Vui lòng đăng nhập trước khi mua hàng hoặc có lỗi mạng.'
                    });
                });
            }
        </script>
    </th:block>
</body>

</html>
