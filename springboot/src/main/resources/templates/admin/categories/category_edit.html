<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Sửa Danh Mục | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <div th:replace="~{admin/partials/layout :: sidebar}"></div>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                <div
                    class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2"><i class="fas fa-edit me-2"></i> CẬP NHẬT DANH MỤC</h1>
                    <div class="d-flex align-items-center">
                        <a th:href="@{/admin/categories}" class="btn btn-sm btn-outline-secondary me-2"><i
                                class="fas fa-arrow-left me-1"></i> Quay lại</a>
                        <div th:replace="~{admin/partials/layout :: topbar}"></div>
                    </div>
                </div>

                <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
                    <i class="fas fa-exclamation-circle me-1"></i> <span th:text="${errorMessage}"></span>
                </div>

                <div class="container pb-5">
                    <div class="card p-4">
                        <form th:action="@{'/admin/categories/edit/' + ${category.id}}" method="POST"
                            th:object="${category}">
                            <input type="hidden" th:field="*{id}">
                            <div class="row mb-3">
                                <div class="col-md-12">
                                    <label class="form-label fw-bold">Tên danh mục <span
                                            class="text-danger">*</span></label>
                                    <input type="text" th:field="*{name}" class="form-control" required>
                                </div>
                            </div>
                            <div class="text-end mt-4">
                                <button type="submit" class="btn btn-primary fw-bold"><i class="fas fa-save"></i> Cập
                                    nhật</button>
                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
