<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Cập Nhật Sách | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .card-header {
            background: white;
            border-bottom: 1px solid #eee;
            padding: 20px 30px;
            border-radius: 12px 12px 0 0 !important;
        }

        .form-label {
            font-weight: 600;
            color: #555;
            font-size: 0.9rem;
        }

        .form-control,
        .form-select {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #dee2e6;
        }

        .form-control:focus {
            border-color: #C92127;
            box-shadow: 0 0 0 3px rgba(201, 33, 39, 0.1);
        }

        .btn-save {
            background-color: #C92127;
            color: white;
            font-weight: 600;
            padding: 10px 30px;
            border-radius: 8px;
            border: none;
            transition: 0.3s;
        }

        .btn-save:hover {
            background-color: #a11b20;
            transform: translateY(-2px);
        }

        .upload-box {
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background: #fff;
        }

        .upload-box:hover {
            border-color: #C92127;
            background: #fff5f5;
        }

        #previewImg {
            max-height: 220px;
            max-width: 100%;
            border-radius: 8px;
            display: none;
            margin: 0 auto;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            object-fit: contain;
        }

        .upload-box.dragover {
            border-color: #C92127;
            background: #fff5f5;
        }

        #fileNameHint {
            font-size: 0.85rem;
            color: #6c757d;
            margin-top: 0.75rem;
            word-break: break-all;
        }

        #categorySelect {
            min-height: 2.75rem;
        }

        .invalid-feedback {
            display: block;
        }

        @media (min-width: 992px) {
            .admin-product-sidebar {
                position: sticky;
                top: 1rem;
                align-self: flex-start;
            }
        }

        .card-sidebar-plain .card-header {
            padding: 16px 20px;
        }

        .card-sidebar-plain .card-body {
            padding: 20px;
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div th:replace="~{admin/partials/layout :: sidebar}"></div>

            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="fw-bold text-dark"><i class="fas fa-edit text-primary me-2"></i> Cập Nhật Sách</h3>
                    <div>
                        <a th:href="@{/admin/products}" class="btn btn-outline-secondary me-3"><i
                                class="fas fa-arrow-left me-2"></i> Quay lại</a>
                        <div th:replace="~{admin/partials/layout :: topbar}" class="d-inline-block"></div>
                    </div>
                </div>

                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-circle me-1"></i> <span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="fas fa-check-circle me-1"></i> <span th:text="${param.success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <form th:action="@{'/admin/products/edit/' + ${product.id}}" method="POST" enctype="multipart/form-data"
                    th:object="${product}" novalidate>
                    <input type="hidden" th:field="*{id}">
                    <div class="row g-4">
                        <div class="col-lg-8">
                            <div class="card mb-4">
                                <div class="card-header">
                                    <h5 class="mb-0">Thông tin chung</h5>
                                </div>
                                <div class="card-body p-4">
                                    <div class="mb-3">
                                        <label class="form-label">Tên sách <span class="text-danger">*</span></label>
                                        <input type="text" th:field="*{name}"
                                            th:classappend="${#fields.hasErrors('name')} ? ' is-invalid'"
                                            class="form-control" placeholder="Nhập tên sách..." required>
                                        <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                                    </div>
                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Tác giả</label>
                                            <input type="text" th:field="*{authorName}" class="form-control"
                                                placeholder="Nhập tên tác giả...">
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label d-flex justify-content-between align-items-center gap-2">
                                                <span>Danh mục <span class="text-danger">*</span></span>
                                                <a th:href="@{/admin/categories}" class="small text-decoration-none">Quản lý</a>
                                            </label>
                                            <div th:if="${categories == null or categories.isEmpty()}" class="alert alert-warning py-2 small mb-0">
                                                Chưa có danh mục.
                                            </div>
                                            <select th:unless="${categories == null or categories.isEmpty()}"
                                                th:field="*{category.id}" id="categorySelect" class="form-select"
                                                th:classappend="${#fields.hasErrors('category')} ? ' is-invalid'"
                                                required>
                                                <option value="">-- Chọn Danh mục --</option>
                                                <option th:each="c : ${categories}" th:value="${c.id}"
                                                    th:text="${c.name}"></option>
                                            </select>
                                            <div class="invalid-feedback" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
                                        </div>
                                    </div>
                                    <div class="mb-0">
                                        <label class="form-label">Mô tả sản phẩm</label>
                                        <textarea th:field="*{description}" class="form-control" rows="10"
                                            placeholder="Nhập mô tả sản phẩm..."></textarea>
                                    </div>
                                </div>
                            </div>

                            <!-- Publishing info -->
                            <div class="card mb-4">
                                <div class="card-header">
                                    <h5 class="mb-0">Chi tiết xuất bản</h5>
                                </div>
                                <div class="card-body p-4">
                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Nhà cung cấp</label>
                                            <input type="text" th:field="*{supplierName}" class="form-control"
                                                placeholder="Nhập tên Nhà cung cấp...">
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Nhà xuất bản</label>
                                            <input type="text" th:field="*{publisherName}" class="form-control"
                                                placeholder="Nhập tên NXB...">
                                        </div>
                                        <div class="col-md-4 mb-3">
                                            <label class="form-label">Năm xuất bản</label>
                                            <input type="number" th:field="*{publicationYear}" class="form-control"
                                                placeholder="VD: 2024" min="1900">
                                        </div>
                                        <div class="col-md-4 mb-3">
                                            <label class="form-label">Hình thức bìa</label>
                                            <select th:field="*{coverType}" class="form-select">
                                                <option value="">— Chọn —</option>
                                                <option value="Bìa Mềm">Bìa Mềm</option>
                                                <option value="Bìa Cứng">Bìa Cứng</option>
                                                <option value="Bìa Gập">Bìa Gập</option>
                                            </select>
                                        </div>
                                        <div class="col-md-4 mb-3">
                                            <label class="form-label">Số trang</label>
                                            <input type="number" th:field="*{pages}" class="form-control"
                                                placeholder="VD: 200" min="1">
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Ngôn ngữ</label>
                                            <select th:field="*{language}" class="form-select">
                                                <option value="">— Chọn —</option>
                                                <option value="Tiếng Việt">Tiếng Việt</option>
                                                <option value="Tiếng Anh">Tiếng Anh</option>
                                                <option value="Song ngữ">Song ngữ</option>
                                                <option value="Khác">Khác</option>
                                            </select>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Kích thước (in trên bìa)</label>
                                            <input type="text" th:field="*{dimensions}" class="form-control"
                                                placeholder="VD: 14,8 x 21 cm">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-lg-4 admin-product-sidebar">
                            <div class="card mb-4 card-sidebar-plain">
                                <div class="card-header">
                                    <h5 class="mb-0">Giá &amp; Kho hàng</h5>
                                </div>
                                <div class="card-body">
                                    <div class="mb-3">
                                        <label class="form-label">Giá bán (VNĐ) <span class="text-danger">*</span></label>
                                        <div class="input-group">
                                            <input type="number" th:field="*{price}"
                                                th:classappend="${#fields.hasErrors('price')} ? ' is-invalid'"
                                                class="form-control fw-bold text-danger" required min="0" step="1">
                                            <span class="input-group-text">đ</span>
                                        </div>
                                        <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Số lượng nhập <span class="text-danger">*</span></label>
                                        <input type="number" th:field="*{quantity}"
                                            th:classappend="${#fields.hasErrors('quantity')} ? ' is-invalid'"
                                            class="form-control" required min="0">
                                        <small class="text-muted">Số lượng tồn kho hiện tại.</small>
                                        <div class="invalid-feedback" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></div>
                                    </div>
                                    <div class="mb-3 p-3 bg-light rounded border">
                                        <label class="form-label mb-1">Đã bán</label>
                                        <div class="fs-5 fw-bold text-secondary" th:text="${product.soldCount != null ? product.soldCount : 0}">0</div>
                                        <small class="text-muted">Cập nhật theo đơn hàng.</small>
                                    </div>
                                    <div class="mb-0">
                                        <label class="form-label">Trạng thái hiển thị</label>
                                        <select th:field="*{isHidden}" class="form-select">
                                            <option value="false">Hiển thị (Khách hàng có thể thấy)</option>
                                            <option value="true">Đang ẩn (Tạm khóa/Hết hàng)</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <div class="card mb-4 card-sidebar-plain">
                                <div class="card-header">
                                    <h5 class="mb-0">Hình ảnh</h5>
                                </div>
                                <div class="card-body text-center">
                                    <div class="upload-box mb-0" id="uploadBox" role="button" tabindex="0"
                                        onclick="document.getElementById('fileInput').click()"
                                        onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();document.getElementById('fileInput').click();}">
                                        <img id="previewImg"
                                            th:src="@{${product.imageUrl != null ? (product.imageUrl.startsWith('http') or product.imageUrl.startsWith('/uploads/') ? product.imageUrl : '/uploads/' + product.imageUrl) : '/uploads/default.jpg'}}" alt="Preview"
                                            th:style="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)} ? 'display:block' : 'display:none'"
                                            onerror="this.onerror=null;this.src='/uploads/default.jpg'">
                                        <div id="uploadPlaceholder"
                                            th:style="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)} ? 'display:none' : 'display:block'">
                                            <i class="fas fa-cloud-upload-alt fa-3x text-secondary mb-2"></i>
                                            <p class="text-muted small mb-0">Click để tải ảnh lên</p>
                                        </div>
                                    </div>
                                    <input type="file" name="imageFile" id="fileInput" class="d-none" accept="image/*"
                                        onchange="previewFile()">
                                    <input type="hidden" th:field="*{imageUrl}">
                                    <div id="fileNameHint" class="small text-muted mt-2 mb-0"></div>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-save w-100 py-3"
                                th:disabled="${categories == null or categories.isEmpty()}">
                                <i class="fas fa-save me-2"></i> CẬP NHẬT SẢN PHẨM
                            </button>
                        </div>
                    </div>
                </form>

            </main>
        </div>
    </div>

    <script>
        function setImageFile(file) {
            if (!file || !file.type.startsWith('image/')) return;
            const input = document.getElementById('fileInput');
            const dt = new DataTransfer();
            dt.items.add(file);
            input.files = dt.files;
            previewFile();
        }

        function previewFile() {
            const preview = document.getElementById('previewImg');
            const placeholder = document.getElementById('uploadPlaceholder');
            const hint = document.getElementById('fileNameHint');
            const file = document.getElementById('fileInput').files[0];
            const reader = new FileReader();

            reader.onloadend = function () {
                preview.src = reader.result;
                preview.style.display = 'block';
                placeholder.style.display = 'none';
            };

            if (file) {
                reader.readAsDataURL(file);
                if (hint) hint.textContent = file.name + ' (' + (file.size / 1024).toFixed(1) + ' KB)';
            } else if (hint) {
                hint.textContent = '';
            }
        }

        document.addEventListener('DOMContentLoaded', function () {
            const box = document.getElementById('uploadBox');
            const input = document.getElementById('fileInput');
            if (!box || !input) return;
            ['dragenter', 'dragover'].forEach(function (ev) {
                box.addEventListener(ev, function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                    box.classList.add('dragover');
                });
            });
            ['dragleave', 'drop'].forEach(function (ev) {
                box.addEventListener(ev, function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                    box.classList.remove('dragover');
                });
            });
            box.addEventListener('drop', function (e) {
                const f = e.dataTransfer.files[0];
                setImageFile(f);
            });
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/tinymce@6.8.2/tinymce.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            if (typeof tinymce === 'undefined') return;
            tinymce.init({
                selector: 'textarea[name="description"]',
                height: 400,
                menubar: false,
                plugins: 'lists autolink link charmap',
                toolbar_mode: 'floating',
                toolbar: 'undo redo | bold italic strikethrough | formatselect | bullist numlist | blockquote | removeformat',
                block_formats: 'Paragraph=p;Heading 1=h1;Heading 2=h2',
                content_style: 'body { font-family: Segoe UI, Helvetica, Arial, sans-serif; font-size: 16px }'
            });
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
