<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{admin/layout/admin_layout}">

<head>
    <title>Thông tin tài khoản | Admin</title>
</head>

<body>
    <div layout:fragment="pageTitle">THÔNG TIN TÀI KHOẢN</div>

    <div layout:fragment="content">
        <div th:if="${errorMessage != null or param.error != null}" class="alert alert-danger d-flex align-items-center" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span th:text="${errorMessage ?: param.error}"></span>
        </div>
        <div th:if="${successMessage != null or param.success != null}" class="alert alert-success d-flex align-items-center" role="alert">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${successMessage ?: param.success}"></span>
        </div>

        <div class="row g-4">
            <!-- Thông tin cá nhân -->
            <div class="col-lg-8 col-xl-6 mx-auto">
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
                        <h5 class="mb-0 fw-bold">
                            <i class="fas fa-id-card me-1 text-primary"></i> Thông tin cá nhân
                        </h5>
                        <span class="badge bg-primary bg-opacity-10 text-primary text-uppercase px-3 py-2 rounded-pill">
                            <i class="fas fa-user-shield me-1"></i>
                            <span th:text="${userInfo != null and userInfo.role != null and userInfo.role.toUpperCase() == 'ADMIN' ? 'Admin' : 'User'}"></span>
                        </span>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/admin/profile}" method="POST" autocomplete="off">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Tên đăng nhập</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-user text-muted"></i></span>
                                    <input type="text" class="form-control bg-light border-start-0" th:value="${userInfo != null ? userInfo.username : ''}" disabled>
                                </div>
                                <div class="form-text">Tên đăng nhập không thể thay đổi.</div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Họ và tên</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0"><i class="fas fa-signature text-muted"></i></span>
                                    <input type="text" class="form-control border-start-0" name="fullName" th:value="${userInfo != null ? userInfo.fullName : ''}" required>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Email liên hệ</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                                    <input type="email" class="form-control border-start-0" name="email" th:value="${userInfo != null ? userInfo.email : ''}" required>
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-primary fw-bold w-100 py-2 shadow-sm">
                                <i class="fas fa-save me-1"></i> Lưu thay đổi
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
