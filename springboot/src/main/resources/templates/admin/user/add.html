<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Thêm Người Dùng | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); }
        .card-header { background: white; border-bottom: 1px solid #eee; padding: 20px 30px; border-radius: 12px 12px 0 0 !important; }
        .form-label { font-weight: 600; color: #555; font-size: 0.9rem; }
        .form-control, .form-select { padding: 10px 15px; border-radius: 8px; border: 1px solid #dee2e6; }
        .btn-save { background-color: #1a1a2e; color: white; font-weight: 600; padding: 10px 30px; border-radius: 8px; border: none; transition: 0.3s; }
        .btn-save:hover { background-color: #0f0f1a; transform: translateY(-2px); }
        .password-wrapper { position: relative; }
        .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #777; z-index: 10; }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div th:replace="~{admin/partials/layout :: sidebar}"></div>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                <div class="container py-5">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h3 class="fw-bold text-dark"><i class="fas fa-user-plus text-primary me-2"></i> Thêm Người Dùng Mới</h3>
                        <div class="d-flex align-items-center">
                            <a th:href="@{/admin/user}" class="btn btn-outline-secondary me-3"><i class="fas fa-arrow-left me-2"></i> Quay lại</a>
                            <div th:replace="~{admin/partials/layout :: topbar}"></div>
                        </div>
                    </div>

                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <div class="row justify-content-center">
                        <div class="col-lg-8">
                            <div class="card">
                                <div class="card-header"><h5 class="mb-0">Thông tin tài khoản</h5></div>
                                <div class="card-body p-4">
                                    <form th:action="@{/admin/user/add}" method="POST" th:object="${user}">
                                        <div class="mb-3">
                                            <label class="form-label">Họ và tên</label>
                                            <input type="text" th:field="*{fullName}" class="form-control" required>
                                        </div>
                                        <div class="row">
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Tên đăng nhập <span class="text-danger">*</span></label>
                                                <input type="text" th:field="*{username}" class="form-control" required>
                                            </div>
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Email <span class="text-danger">*</span></label>
                                                <input type="email" th:field="*{email}" class="form-control" required>
                                            </div>
                                        </div>
                                        <div class="row">
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Mật khẩu <span class="text-danger">*</span></label>
                                                <div class="password-wrapper">
                                                    <input type="password" th:field="*{password}" class="form-control" id="password" required>
                                                    <i class="fas fa-eye toggle-password" onclick="togglePassword('password', this)"></i>
                                                </div>
                                            </div>
                                            <div class="col-md-6 mb-3">
                                                <label class="form-label">Vai trò</label>
                                                <select th:field="*{role}" class="form-select">
                                                    <option value="user">Thành viên (User)</option>
                                                    <option value="admin">Quản trị viên (Admin)</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div class="mt-4 text-end">
                                            <button type="submit" class="btn btn-save"><i class="fas fa-save me-2"></i> LƯU NGƯỜI DÙNG</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script>
        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }
    </script>
</body>

</html>
