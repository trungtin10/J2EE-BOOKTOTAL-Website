<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{admin/layout/admin_layout}">

<head>
    <title>Chỉnh Sửa Người Dùng</title>
    <th:block layout:fragment="css">
        <style>
            .password-wrapper { position: relative; }
            .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #777; z-index: 10; }
        </style>
    </th:block>
</head>

<body>
    <div layout:fragment="pageTitle">Chỉnh sửa người dùng</div>

    <div layout:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
            <h3 class="h2"><i class="fas fa-user-edit text-primary me-2"></i> Chỉnh Sửa Người Dùng</h3>
            <a th:href="@{/admin/user}" class="btn btn-outline-secondary"><i class="fas fa-arrow-left me-2"></i> Quay lại</a>
        </div>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-white py-3"><h5 class="mb-0 fw-bold">Thông tin tài khoản</h5></div>
                    <div class="card-body p-4">
                        <form th:action="@{'/admin/user/edit/' + ${user.id}}" method="POST" th:object="${user}">
                            <input type="hidden" th:field="*{id}">

                            <div class="mb-3">
                                <label class="form-label fw-bold">Họ và tên</label>
                                <input type="text" th:field="*{fullName}" class="form-control" required>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Tên đăng nhập</label>
                                    <input type="text" th:field="*{username}" class="form-control" readonly style="background-color: #e9ecef;">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Email <span class="text-danger">*</span></label>
                                    <input type="email" th:field="*{email}" class="form-control"
                                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''" required>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Mật khẩu mới (Để trống nếu không đổi)</label>
                                    <div class="password-wrapper">
                                        <input type="password" th:field="*{password}" class="form-control" id="password"
                                               th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''">
                                        <i class="fas fa-eye toggle-password" onclick="togglePassword('password', this)"></i>
                                        <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                                    </div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Vai trò</label>
                                    <select th:field="*{role}" class="form-select">
                                        <option value="user">Thành viên (User)</option>
                                        <option value="admin">Quản trị viên (Admin)</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mt-4 text-end">
                                <button type="submit" class="btn btn-primary px-4 fw-bold"><i class="fas fa-save me-2"></i> CẬP NHẬT</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="script">
        <script>
            function togglePassword(inputId, icon) {
                const input = document.getElementById(inputId);
                if (input.type === "password") {
                    input.type = "text";
                    icon.classList.remove("fa-eye");
                    icon.classList.add("fa-eye-slash");
                } else {
                    input.type = "password";
                    icon.classList.remove("fa-eye-slash");
                    icon.classList.add("fa-eye");
                }
            }
        </script>
    </th:block>
</body>

</html>
