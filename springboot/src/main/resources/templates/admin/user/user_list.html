<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Quản Lý Người Dùng | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); }
        .table th { background-color: #f8f9fa; font-weight: 600; }
        .role-badge { padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; }
        .role-admin { background-color: #cff4fc; color: #055160; }
        .role-user { background-color: #d1e7dd; color: #0f5132; }
        .sidebar { min-height: 100vh; background-color: #212529; padding-top: 20px; }
        .sidebar .nav-link { color: rgba(255,255,255,.75); padding: 12px 20px; transition: 0.2s; }
        .sidebar .nav-link:hover { color: #fff; background-color: rgba(255,255,255,.1); }
        .sidebar .nav-link.active { color: #fff; background-color: #0d6efd; font-weight: 600; }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div th:replace="~{admin/partials/layout :: sidebar}"></div>

            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
                    <h1 class="h2"><i class="fas fa-users me-2 text-primary"></i> QUẢN LÝ NGƯỜI DÙNG</h1>
                    <div class="d-flex align-items-center">
                        <div th:replace="~{admin/partials/layout :: topbar}"></div>
                        <a th:href="@{/admin/user/add}" class="btn btn-sm btn-warning fw-bold shadow-sm ms-3">
                            <i class="fas fa-plus me-1"></i> Thêm mới
                        </a>
                    </div>
                </div>

                <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="fas fa-check-circle me-1"></i> <span th:text="${param.success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-circle me-1"></i> <span th:text="${param.error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div class="card shadow-sm">
                    <div class="card-header bg-white border-0 p-3">
                        <form class="row g-2 align-items-center" th:action="@{/admin/user}" method="get">
                            <input type="hidden" name="size" th:value="${size}">
                            <div class="col-12 col-md-6 col-lg-4">
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="fas fa-search"></i></span>
                                    <input class="form-control" type="text" name="keyword" th:value="${keyword}"
                                           placeholder="Tìm theo họ tên hoặc email...">
                                </div>
                            </div>
                            <div class="col-auto">
                                <button class="btn btn-outline-primary" type="submit">
                                    <i class="fas fa-filter me-1"></i> Tìm kiếm
                                </button>
                            </div>
                            <div class="col-auto" th:if="${keyword != null and !#strings.isEmpty(keyword)}">
                                <a class="btn btn-outline-secondary" th:href="@{/admin/user(size=${size})}">
                                    <i class="fas fa-xmark me-1"></i> Xóa lọc
                                </a>
                            </div>
                            <div class="col-auto ms-auto text-muted small">
                                <span th:text="'Tổng: ' + ${usersPage.totalElements} + ' người dùng'"></span>
                            </div>
                        </form>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">ID</th>
                                        <th>Tên đăng nhập</th>
                                        <th>Họ tên</th>
                                        <th>Email</th>
                                        <th>Vai trò</th>
                                        <th>Trạng thái</th>
                                        <th class="text-center">Hành động</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="u : ${users}">
                                        <td class="ps-4" th:text="'#' + ${u.id}"></td>
                                        <td class="fw-bold" th:text="${u.username}"></td>
                                        <td th:text="${u.fullName}"></td>
                                        <td th:text="${u.email}"></td>
                                        <td>
                                            <span th:if="${u.role == 'admin'}" class="role-badge role-admin">Admin</span>
                                            <span th:if="${u.role != 'admin'}" class="role-badge role-user">User</span>
                                        </td>
                                        <td>
                                            <span class="badge"
                                                  th:classappend="${u.enabled == null or u.enabled} ? ' bg-success' : ' bg-danger'"
                                                  th:text="${u.enabled == null or u.enabled} ? 'Hoạt động' : 'Đã khóa'"></span>
                                        </td>
                                        <td class="text-center">
                                            <a th:href="@{'/admin/user/edit/' + ${u.id}}" class="btn btn-sm btn-outline-primary me-1" title="Sửa">
                                                <i class="fas fa-edit"></i>
                                            </a>
                                            <form th:if="${u.role != 'admin'}" class="d-inline"
                                                  th:action="@{'/admin/user/toggle/' + ${u.id}}"
                                                  method="post">
                                                <input type="hidden" name="page" th:value="${page}">
                                                <input type="hidden" name="size" th:value="${size}">
                                                <input type="hidden" name="keyword" th:value="${keyword}">
                                                <button type="submit"
                                                        class="btn btn-sm me-1"
                                                        th:classappend="${u.enabled == null or u.enabled} ? ' btn-outline-warning' : ' btn-outline-success'"
                                                        th:title="${u.enabled == null or u.enabled} ? 'Khóa tài khoản' : 'Mở khóa tài khoản'"
                                                        th:onclick="${u.enabled == null or u.enabled} ? 'return confirm(\\'Khóa tài khoản này?\\')' : 'return confirm(\\'Mở khóa tài khoản này?\\')'">
                                                    <i class="fas" th:classappend="${u.enabled == null or u.enabled} ? ' fa-lock' : ' fa-unlock'"></i>
                                                </button>
                                            </form>
                                            <a th:href="@{'/admin/user/delete/' + ${u.id}}" class="btn btn-sm btn-outline-danger"
                                               onclick="return confirm('Bạn có chắc chắn muốn xóa người dùng này?');" title="Xóa">
                                                <i class="fas fa-trash"></i>
                                            </a>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(users)}">
                                        <td colspan="7" class="text-center text-muted py-4">Không tìm thấy người dùng phù hợp.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="card-footer bg-white border-0 p-3" th:if="${usersPage.totalPages > 1}">
                        <nav aria-label="Users pagination">
                            <ul class="pagination pagination-sm mb-0 justify-content-end">
                                <li class="page-item" th:classappend="${usersPage.first} ? ' disabled'">
                                    <a class="page-link"
                                       th:href="@{/admin/user(page=${usersPage.number - 1}, size=${size}, keyword=${keyword})}">Trước</a>
                                </li>
                                <li class="page-item"
                                    th:each="i : ${#numbers.sequence(0, usersPage.totalPages - 1)}"
                                    th:classappend="${i == usersPage.number} ? ' active'">
                                    <a class="page-link"
                                       th:href="@{/admin/user(page=${i}, size=${size}, keyword=${keyword})}"
                                       th:text="${i + 1}"></a>
                                </li>
                                <li class="page-item" th:classappend="${usersPage.last} ? ' disabled'">
                                    <a class="page-link"
                                       th:href="@{/admin/user(page=${usersPage.number + 1}, size=${size}, keyword=${keyword})}">Sau</a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
