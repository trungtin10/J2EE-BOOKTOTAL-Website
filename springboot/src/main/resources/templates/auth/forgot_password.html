<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>Quên mật khẩu - Bookstore</title>
    <th:block layout:fragment="css">
        <style>
            body {
                background-color: #f0f2f5;
                font-family: 'Segoe UI', sans-serif;
                display: flex;
                flex-direction: column;
                min-height: 100vh;
            }

            .main-content {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 50px 0;
            }

            .auth-card {
                background: white;
                padding: 40px;
                border-radius: 12px;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
                width: 100%;
                max-width: 450px;
            }

            .auth-title {
                font-weight: 800;
                color: #C92127;
                text-align: center;
                margin-bottom: 20px;
                font-size: 1.5rem;
            }

            .form-control {
                padding: 12px;
                border-radius: 8px;
            }

            .btn-auth {
                background-color: #C92127;
                color: white;
                font-weight: 700;
                padding: 12px;
                border-radius: 8px;
                width: 100%;
                border: none;
                transition: 0.3s;
            }

            .btn-auth:hover {
                background-color: #a11b20;
            }
        </style>
    </th:block>
</head>

<body>
    <div layout:fragment="content">
        <div class="main-content">
            <div class="auth-card">
                <h2 class="auth-title">QUÊN MẬT KHẨU</h2>
                <p class="text-center text-muted mb-4 small">Nhập email của bạn để nhận liên kết đặt lại mật khẩu.</p>

                <div th:if="${error}" class="alert alert-danger text-center" th:text="${error}"></div>
                <div th:if="${success}" class="alert alert-success text-center" th:text="${success}"></div>

                <form th:action="@{/forgot-password}" method="POST">
                    <div class="mb-4">
                        <label class="form-label fw-bold">Email đăng ký</label>
                        <input type="email" class="form-control" name="email" required placeholder="vidu@gmail.com">
                    </div>
                    <button type="submit" class="btn-auth">GỬI YÊU CẦU</button>
                </form>

                <div class="text-center mt-4">
                    <a th:href="@{/}" class="text-decoration-none text-muted small"><i
                            class="fas fa-arrow-left me-1"></i> Quay lại trang chủ</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
