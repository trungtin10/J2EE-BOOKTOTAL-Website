<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>Đăng nhập - Bookstore</title>
    <th:block layout:fragment="css">
        <style>
            body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
            .main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 50px 0; }
            .auth-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); width: 100%; max-width: 450px; }
            .auth-title { font-weight: 800; color: #C92127; text-align: center; margin-bottom: 30px; font-size: 1.8rem; }
            .form-control { padding: 12px; border-radius: 8px; }
            .btn-auth { background-color: #C92127; color: white; font-weight: 700; padding: 12px; border-radius: 8px; width: 100%; border: none; transition: 0.3s; }
            .btn-auth:hover { background-color: #a11b20; }
            .password-wrapper { position: relative; }
            .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #777; z-index: 10; }
        </style>
    </th:block>
</head>

<body>
    <div layout:fragment="content">
        <div class="main-content">
            <div class="auth-card">
                <h2 class="auth-title">ĐĂNG NHẬP</h2>

                <!-- Hiển thị thông báo lỗi -->
                <div th:if="${param.error}" class="alert alert-danger text-center">Tên đăng nhập hoặc mật khẩu không đúng.</div>

                <!-- Hiển thị thông báo đăng xuất -->
                <div th:if="${param.logout}" class="alert alert-success text-center">Bạn đã đăng xuất thành công.</div>

                <!-- Hiển thị thông báo đăng ký thành công -->
                <div th:if="${param.registered}" class="alert alert-success text-center">Đăng ký thành công! Vui lòng đăng nhập.</div>

                <!-- Hiển thị thông báo đặt lại mật khẩu thành công -->
                <div th:if="${param.resetSuccess}" class="alert alert-success text-center">Đặt lại mật khẩu thành công! Vui lòng đăng nhập bằng mật khẩu mới.</div>

                <!-- Hiển thị thông báo thành công từ Controller (nếu có) -->
                <div th:if="${success}" class="alert alert-success text-center" th:text="${success}"></div>

                <form th:action="@{/login}" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Tên đăng nhập</label>
                        <input type="text" class="form-control" name="username" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Mật khẩu</label>
                        <div class="password-wrapper">
                            <input type="password" class="form-control" name="password" id="password" required>
                            <i class="fas fa-eye toggle-password" onclick="togglePassword('password', this)"></i>
                        </div>
                    </div>
                    <button type="submit" class="btn-auth">ĐĂNG NHẬP</button>
                </form>

                <div class="text-center mt-4">
                    <p class="text-muted">Chưa có tài khoản? <a th:href="@{/register}" class="text-decoration-none fw-bold text-danger">Đăng ký ngay</a></p>
                    <p class="text-muted"><a th:href="@{/forgot-password}" class="text-decoration-none fw-bold text-secondary">Quên mật khẩu?</a></p>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="script">
        <script>
            function togglePassword(inputId, icon) {
                const input = document.getElementById(inputId);
                if (input.type === "password") {
                    input.type = "text";
                    icon.classList.remove("fa-eye");
                    icon.classList.add("fa-eye-slash");
                } else {
                    input.type = "password";
                    icon.classList.remove("fa-eye-slash");
                    icon.classList.add("fa-eye");
                }
            }
        </script>
    </th:block>
</body>

</html>
