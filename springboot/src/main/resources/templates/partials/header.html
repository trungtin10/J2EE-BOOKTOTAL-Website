<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
</head>
<body>
<div th:fragment="header" class="header-wrapper">
    <style>
        :root { --primary-color: #0b2d5c; --accent-color: #1e40af; --brand-color: #1e40af; --text-color: #0b1b33; }
        .main-header { padding: 15px 0; border-bottom: 1px solid #eee; background: white; }
        .header-content { display: flex; align-items: center; justify-content: space-between; gap: 20px; }
        .brand-logo { font-size: 2rem; font-weight: 800; color: var(--primary-color); text-decoration: none; text-transform: uppercase; }
        .search-container { flex-grow: 1; position: relative; max-width: 500px; }
        .search-input { width: 100%; padding: 10px 45px 10px 20px; border: 2px solid #e0e0e0; border-radius: 50px; outline: none; }
        .search-btn { position: absolute; right: 5px; top: 50%; transform: translateY(-50%); background: var(--primary-color); color: white; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }
        .header-actions { display: flex; align-items: center; gap: 25px; }
        .action-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #555; font-size: 0.8rem; position: relative; cursor: pointer; padding-bottom: 5px; }
        .action-item i { font-size: 1.4rem; margin-bottom: 3px; color: var(--primary-color); }
        .cart-badge { position: absolute; top: -5px; right: -8px; background-color: var(--brand-color); color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 50%; font-weight: bold; border: 2px solid white; display: none; }
        .nav-bar { background-color: var(--primary-color); color: white; position: sticky; top: 0; z-index: 1000; }
        .nav-container { display: flex; align-items: center; }
        .cat-menu-btn { background-color: var(--accent-color); color: white; padding: 12px 20px; font-weight: 700; text-transform: uppercase; font-size: 0.9rem; cursor: pointer; position: relative; width: 260px; }
        .cat-dropdown { display: none; position: absolute; top: 100%; left: 0; width: 100%; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); z-index: 1001; }
        .cat-menu-btn:hover .cat-dropdown { display: block; }
        .cat-item { display: block; padding: 10px 20px; color: #333; text-decoration: none; border-bottom: 1px solid #f0f0f0; }
        .nav-links { display: flex; gap: 10px; margin-left: 20px; }
        .nav-link-item { color: white; text-decoration: none; padding: 12px 15px; font-weight: 500; font-size: 0.9rem; }
        .dropdown-menu-custom { display: none; position: absolute; top: 100%; right: 0; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.15); border-radius: 8px; padding: 0; z-index: 1001; min-width: 220px; }
        .action-item:hover .dropdown-menu-custom { display: block; }
        .user-menu-link { display: block; padding: 10px 15px; color: #333; text-decoration: none; border-bottom: 1px solid #f5f5f5; font-size: 0.9rem; }
        .user-menu-link:hover { background-color: #f8f9fa; color: var(--accent-color); }
        .cart-dropdown { width: 350px; }
        .cart-item-row { display: flex; padding: 10px 15px; border-bottom: 1px solid #f5f5f5; align-items: center; }
        .cart-img { width: 50px; height: 70px; object-fit: cover; border-radius: 4px; margin-right: 10px; }
        .cart-info { flex: 1; }
        .cart-name { font-size: 0.85rem; font-weight: 600; color: #333; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .cart-price { font-size: 0.85rem; color: var(--brand-color); font-weight: 700; }
    </style>

    <div class="main-header">
        <div class="container header-content">
            <a th:href="@{/}" class="brand-logo">BOOKTOTAL</a>
            <form th:action="@{/products}" method="GET" class="search-container">
                <input type="text" name="search" class="search-input" placeholder="Tìm kiếm sách..." required th:value="${param.search}">
                <button type="submit" class="search-btn"><i class="fas fa-search"></i></button>
            </form>
            <div class="header-actions">
                <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin}" class="action-item">
                    <i class="fas fa-user-shield"></i><span>Quản trị</span>
                </a>

                <!-- Notifications -->
                <div class="action-item" id="notifWrap">
                    <div id="notifBtn" class="d-flex flex-column align-items-center" style="user-select:none;">
                        <i class="far fa-bell"></i><span>Thông báo</span>
                    </div>
                    <span id="notifBadge" class="cart-badge" th:text="${unreadNotifications}" style="display:none;">0</span>

                    <div id="notifDropdown" class="dropdown-menu-custom p-0" style="min-width: 320px;">
                        <div class="p-3 border-bottom d-flex align-items-center justify-content-between">
                            <div class="fw-bold" style="color: var(--primary-color);">Thông báo</div>
                            <div class="small text-muted">
                                <span id="notifTotalText">0</span>
                            </div>
                        </div>

                        <div sec:authorize="!isAuthenticated()" class="p-3 text-center text-muted small">
                            Vui lòng <a href="#" onclick="openLoginModal(event)" class="text-danger fw-bold">đăng nhập</a> để xem thông báo
                        </div>

                        <div sec:authorize="isAuthenticated()">
                            <div id="notifList" class="p-2" style="max-height: 360px; overflow:auto;">
                                <div class="text-center py-4 text-muted small">Đang tải...</div>
                            </div>
                            <div class="p-3 border-top">
                                <a th:href="@{/notifications}" class="btn btn-outline-danger btn-sm w-100 fw-bold">XEM TẤT CẢ</a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Cart -->
                <div class="action-item">
                    <a th:href="@{/cart}" class="text-decoration-none text-dark d-flex flex-column align-items-center">
                        <i class="fas fa-shopping-bag"></i><span>Giỏ hàng</span>
                        <span id="cartBadge" class="cart-badge">0</span>
                    </a>
                    <div class="dropdown-menu-custom cart-dropdown">
                        <div id="cartDropdownList" class="cart-list">
                            <div class="text-center py-4 text-muted small">Giỏ hàng trống</div>
                        </div>
                        <div class="p-3 border-top"><a th:href="@{/cart}" class="btn btn-danger btn-sm w-100 fw-bold">XEM GIỎ HÀNG</a></div>
                    </div>
                </div>

                <!-- User -->
                <div class="action-item">
                    <i class="fas fa-user-circle"></i>
                    <span sec:authorize="!isAuthenticated()">Tài khoản</span>
                    <span sec:authorize="isAuthenticated()" sec:authentication="name"></span>
                    <div class="dropdown-menu-custom user-dropdown">
                        <div sec:authorize="isAuthenticated()">
                            <a th:href="@{/profile}" class="user-menu-link"><i class="fas fa-user me-2"></i> Hồ sơ cá nhân</a>
                            <a th:href="@{/orders}" class="user-menu-link"><i class="fas fa-history me-2"></i> Lịch sử mua hàng</a>
                            <form th:action="@{/logout}" method="post" style="margin:0;">
                                <button type="button" onclick="confirmLogout(this)"
                                    class="user-menu-link text-danger w-100 text-start border-0 bg-transparent">
                                    <i class="fas fa-sign-out-alt me-2"></i> Đăng xuất
                                </button>
                            </form>
                        </div>
                        <div sec:authorize="!isAuthenticated()">
                            <a href="#" class="user-menu-link" onclick="openLoginModal(event)">Đăng nhập</a>
                            <a href="#" class="user-menu-link" onclick="openRegisterModal(event)">Đăng ký</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="container nav-container">
            <div class="cat-menu-btn"><i class="fas fa-bars me-2"></i> Danh mục sản phẩm
                <div class="cat-dropdown">
                    <a th:each="cat : ${categories}" th:href="@{/products(categoryId=${cat.id})}" class="cat-item" th:text="${cat.name}"></a>
                </div>
            </div>
            <div class="nav-links">
                <a th:href="@{/}" class="nav-link-item">Trang chủ</a>
                <a th:href="@{/products}" class="nav-link-item">Tất cả sản phẩm</a>
            </div>
        </div>
    </div>

    <script>
        function getLocalCartItems() {
            try {
                const raw = localStorage.getItem('cart_items_v1');
                const parsed = raw ? JSON.parse(raw) : [];
                if (!Array.isArray(parsed)) return [];
                return parsed
                    .map(x => ({
                        productId: Number(x.productId),
                        quantity: Number(x.quantity)
                    }))
                    .filter(x => Number.isFinite(x.productId) && x.productId > 0 && Number.isFinite(x.quantity) && x.quantity > 0);
            } catch (e) {
                return [];
            }
        }

        function setLocalCartItems(items) {
            try {
                localStorage.setItem('cart_items_v1', JSON.stringify(items || []));
            } catch (e) {}
        }

        async function syncLocalCartOnce() {
            // prevent repeated sync
            try {
                if (sessionStorage.getItem('cart_synced_v1') === '1') return;
                sessionStorage.setItem('cart_synced_v1', '1');
            } catch (e) {}

            const items = getLocalCartItems();
            if (!items.length) return;

            try {
                await fetch('/cart/sync', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ items })
                });
                // clear local cart after syncing to session
                setLocalCartItems([]);
            } catch (e) {
                // ignore
            }
        }

        function refreshCartDropdownHeader() {
            fetch('/cart/summary')
                .then(r => r.json())
                .then(data => {
                    const badge = document.getElementById('cartBadge');
                    if (badge) {
                        badge.textContent = data.totalQty;
                        badge.style.display = data.totalQty > 0 ? 'inline-block' : 'none';
                    }
                    const list = document.getElementById('cartDropdownList');
                    if (list) {
                        if (!data.items || data.items.length === 0) {
                            list.innerHTML = '<div class="text-center py-4 text-muted small">Giỏ hàng trống</div>';
                        } else {
                            list.innerHTML = data.items.slice(0, 5).map(item => `
                                <div class="cart-item-row">
                                    <img src="${item.imageUrl ? (item.imageUrl.startsWith('http') || item.imageUrl.startsWith('/uploads/') ? item.imageUrl : '/uploads/' + item.imageUrl) : '/uploads/default.jpg'}" class="cart-img" onerror="this.src='/uploads/default.jpg'">
                                    <div class="cart-info">
                                        <div class="cart-name">${item.name}</div>
                                        <div class="d-flex justify-content-between mt-1">
                                            <span class="small text-muted">x${item.quantity}</span>
                                            <span class="cart-price">${item.price.toLocaleString('vi-VN')}đ</span>
                                        </div>
                                    </div>
                                </div>`).join('');
                        }
                    }
                });
        }
        document.addEventListener('DOMContentLoaded', async () => {
            await syncLocalCartOnce();
            refreshCartDropdownHeader();

            // Notifications badge (server-rendered fallback)
            (function initNotifBadge() {
                const badge = document.getElementById('notifBadge');
                if (!badge) return;
                const n = Number((badge.textContent || '').trim());
                badge.style.display = n > 0 ? 'inline-block' : 'none';
                const totalText = document.getElementById('notifTotalText');
                if (totalText) totalText.textContent = n > 0 ? `${n} chưa đọc` : '0';
            })();

            // Notifications dropdown (click to open + load recent)
            const wrap = document.getElementById('notifWrap');
            const btn = document.getElementById('notifBtn');
            const dd = document.getElementById('notifDropdown');
            if (wrap && btn && dd) {
                const close = () => dd.style.display = 'none';
                const open = () => dd.style.display = 'block';

                const fmtTime = (isoLike) => {
                    // server may serialize LocalDateTime as "2026-03-30T20:17:27.867"
                    try {
                        const d = new Date(isoLike);
                        if (isNaN(d.getTime())) return '';
                        return d.toLocaleString('vi-VN');
                    } catch (e) { return ''; }
                };

                const renderList = (items) => {
                    const list = document.getElementById('notifList');
                    if (!list) return;
                    if (!items || items.length === 0) {
                        list.innerHTML = '<div class="text-center py-4 text-muted small">Chưa có thông báo</div>';
                        return;
                    }
                    list.innerHTML = items.map(n => `
                        <div class="px-2 py-2 rounded-2" style="border: 1px solid rgba(15,23,42,0.08); background:#fff; margin:6px 6px;">
                            <div class="d-flex justify-content-between gap-2">
                                <div class="fw-bold" style="color: var(--primary-color); font-size: 0.9rem;">${(n.title || '').toString().replaceAll('<','&lt;')}</div>
                                <div class="text-muted small" style="white-space:nowrap;">${fmtTime(n.createdAt)}</div>
                            </div>
                            <div class="text-muted small mt-1" style="line-height:1.35;">${(n.message || '').toString().replaceAll('<','&lt;')}</div>
                        </div>
                    `).join('');
                };

                const refresh = async () => {
                    // unread count
                    try {
                        const r = await fetch('/notifications/unread-count', { headers: { 'Accept': 'application/json' } });
                        const unread = r.ok ? Number(await r.text()) : 0;
                        const badge = document.getElementById('notifBadge');
                        if (badge) {
                            badge.textContent = String(unread || 0);
                            badge.style.display = unread > 0 ? 'inline-block' : 'none';
                        }
                        const totalText = document.getElementById('notifTotalText');
                        if (totalText) totalText.textContent = unread > 0 ? `${unread} chưa đọc` : '0';
                    } catch (e) {}

                    // recent list
                    try {
                        const r = await fetch('/notifications/recent', { headers: { 'Accept': 'application/json' } });
                        if (!r.ok) { renderList([]); return; }
                        const items = await r.json();
                        renderList(items);
                    } catch (e) {
                        renderList([]);
                    }
                };

                btn.addEventListener('click', async (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    const isOpen = dd.style.display === 'block';
                    if (isOpen) { close(); return; }
                    open();
                    await refresh();
                });

                document.addEventListener('click', (e) => {
                    if (!wrap.contains(e.target)) close();
                });
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') close();
                });
            }
        });
    </script>
</div>
</body>
</html>
